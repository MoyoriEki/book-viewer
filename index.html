<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BookViewer</title>
<link rel="stylesheet" href="https://moyorieki.github.io/storage-bridge/storage-bridge.css">
<script src="https://moyorieki.github.io/storage-bridge/storage-bridge.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0e0e;
    --bg-raised: #171717;
    --bg-hover: #222;
    --text: #e0e0e0;
    --text-muted: #777;
    --accent: #e8cf6a;
    --accent-dim: rgba(232, 207, 106, 0.15);
    --border: #2a2a2a;
    --danger: #e85050;
    --radius: 6px;
    --sb-accent: #e8cf6a;
    --sb-bg: #171717;
    --sb-text: #e0e0e0;
    --sb-border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ============================================
     CONNECTION SCREEN
     ============================================ */
  #connection-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 32px;
  }
  #connection-screen h1 {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  #dbx-ui {
    max-width: 360px;
    width: 90%;
  }

  /* ============================================
     SHELF SCREEN
     ============================================ */
  #shelf-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  /* Top bar */
  .shelf-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .shelf-topbar h1 {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .shelf-topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 34px;
    height: 34px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg-hover); color: var(--text); border-color: #444; }

  /* List tabs */
  .shelf-tabs {
    display: flex;
    gap: 0;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .shelf-tabs::-webkit-scrollbar { display: none; }
  .shelf-tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .shelf-tab:hover { color: var(--text); }
  .shelf-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Book grid */
  .shelf-grid-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .shelf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (min-width: 768px) {
    .shelf-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  }

  /* Book card */
  .book-card {
    position: relative;
    cursor: pointer;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-raised);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .book-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
  .book-card:active { transform: scale(0.97); }

  /* Drag reorder */
  .book-card.dragging { opacity: 0.3; }
  .book-card.drag-over { box-shadow: 0 0 0 2px var(--accent); }
  .book-cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #131313;
    overflow: hidden;
    flex-shrink: 0;
  }
  .book-cover {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .book-cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 10px;
    padding: 6px;
    text-align: center;
    word-break: break-all;
  }
  .book-title {
    padding: 4px 6px 2px;
    font-size: 10px;
    font-weight: 400;
    line-height: 1.35;
    color: var(--text-muted);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    flex: 1;
  }
  .book-maker {
    padding: 0 6px 4px;
    font-size: 9px;
    color: #444;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .book-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 8px;
    font-weight: 600;
    padding: 1px 4px;
    border-radius: 3px;
    letter-spacing: 0.03em;
    pointer-events: none;
    line-height: 1.2;
  }
  .book-badge.dlsite { background: #1a6fc4; color: #fff; }
  .book-badge.fanza { background: #e04040; color: #fff; }
  .book-badge.other { background: #555; color: #ccc; }

  /* Sort / filter bar */
  .shelf-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .shelf-control-group {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .shelf-control-label {
    font-size: 10px;
    color: #444;
    margin-right: 1px;
  }
  .shelf-pill {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .shelf-pill:hover { border-color: #444; color: var(--text); }
  .shelf-pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .shelf-sort-select {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    outline: none;
  }
  .shelf-sort-select:focus { border-color: var(--accent); }
  .shelf-book-count {
    font-size: 10px;
    color: #444;
    margin-left: auto;
  }

  /* Hidden books modal */
  .hidden-list { max-height: 400px; overflow-y: auto; }
  .hidden-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .hidden-entry:last-child { border-bottom: none; }
  .hidden-entry-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hidden-entry-store { font-size: 10px; color: #555; flex-shrink: 0; }
  .hidden-entry-restore {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .hidden-entry-restore:hover { border-color: var(--accent); color: var(--accent); }

  /* Star button */
  .book-star {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #666;
    transition: all 0.15s;
    opacity: 0;
  }
  .book-cover-wrap:hover .book-star { opacity: 1; }
  .book-star.active { color: var(--accent); opacity: 1; }
  .book-star:hover { background: rgba(0,0,0,0.75); }

  /* Reading progress indicator */
  .book-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.05);
  }
  .book-progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* Empty state */
  .shelf-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--text-muted);
    font-size: 14px;
    gap: 12px;
  }
  .shelf-empty-icon { font-size: 40px; opacity: 0.3; }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 0;
    min-width: 180px;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
  }
  .ctx-menu.show { display: block; }
  .ctx-item {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    transition: background 0.1s;
  }
  .ctx-item:hover { background: var(--bg-hover); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* Import progress bar (top of shelf) */
  .import-bar {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    display: none;
  }
  .import-bar.active { display: block; }
  .import-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }
  .import-status {
    font-size: 10px;
    color: #555;
    padding: 2px 20px;
    flex-shrink: 0;
    display: none;
  }
  .import-status.active { display: block; }

  /* ============================================
     READER SCREEN
     ============================================ */
  #reader-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
  }

  .reader-canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .reader-canvas img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* Tap zones (invisible) */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 10;
    cursor: pointer;
  }
  .tap-zone-left { left: 0; width: 30%; }
  .tap-zone-center { left: 30%; width: 40%; }
  .tap-zone-right { right: 0; width: 30%; }

  /* Reader toolbar (hidden by default, shown on center tap) */
  .reader-toolbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 40px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }
  .reader-toolbar.visible { transform: translateY(0); }

  .reader-topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(rgba(0,0,0,0.85), transparent);
    padding: 16px 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    transform: translateY(-100%);
    transition: transform 0.25s ease;
  }
  .reader-topbar.visible { transform: translateY(0); }

  .reader-back-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .reader-book-title {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin: 0 12px;
  }
  .reader-binding-btn {
    background: none;
    border: 1px solid #444;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
  }
  .reader-binding-btn:hover { border-color: #666; color: var(--text); }

  .reader-slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .reader-page-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .reader-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  .reader-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .reader-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }
  /* RTL slider: direction reversed in JS by swapping min/max values */

  /* Loading spinner */
  .reader-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading overlay for shelf */
  .shelf-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 13px;
    gap: 10px;
  }

  /* New list modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 320px;
    max-width: 90vw;
  }
  .modal-box h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .modal-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
  }
  .modal-btn:hover { background: var(--bg-hover); }
  .modal-btn.primary {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 500;
  }
  .modal-btn.primary:hover { opacity: 0.85; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 600;
    transition: transform 0.25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* Bookmark indicator on current page */
  .reader-bookmark-indicator {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 28px;
    color: var(--accent);
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.25s, transform 0.25s;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .reader-bookmark-indicator.active { opacity: 1; transform: scale(1); }

  /* Bookmark button in topbar */
  .reader-bookmark-btn {
    background: none;
    border: 1px solid #444;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
    transition: all 0.15s;
  }
  .reader-bookmark-btn:hover { border-color: #666; color: var(--text); }
  .reader-bookmark-btn.active { color: var(--accent); border-color: var(--accent); }

  /* Bookmark list button in toolbar */
  .reader-bm-list-btn {
    background: none;
    border: 1px solid #444;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
    transition: all 0.15s;
    align-self: flex-end;
  }
  .reader-bm-list-btn:hover { border-color: #666; color: var(--text); }
  .reader-bm-list-btn .bm-count { color: var(--accent); margin-left: 4px; }

  /* Bookmark dots on slider track */
  .reader-slider-wrap {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .reader-slider-wrap .reader-slider { width: 100%; }
  .reader-bm-dots {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .reader-bm-dot {
    position: absolute;
    top: 50%;
    width: 4px;
    height: 12px;
    margin-top: -6px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.7;
    pointer-events: auto;
    cursor: pointer;
  }
  .reader-bm-dot:hover { opacity: 1; height: 16px; margin-top: -8px; }

  /* Bookmark list panel (overlay on reader) */
  .bm-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 55vh;
    background: rgba(20, 20, 20, 0.97);
    border-top: 1px solid var(--border);
    z-index: 30;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    backdrop-filter: blur(12px);
  }
  .bm-panel.visible { transform: translateY(0); }

  .bm-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bm-panel-header h4 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .bm-panel-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .bm-panel-close:hover { color: var(--text); }

  .bm-panel-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .bm-panel-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  .bm-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .bm-entry:hover { background: var(--bg-hover); }
  .bm-entry:last-child { border-bottom: none; }
  .bm-entry.current { background: var(--accent-dim); }

  .bm-entry-thumb {
    width: 40px;
    height: 56px;
    background: #111;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bm-entry-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .bm-entry-thumb-placeholder {
    font-size: 9px;
    color: #444;
  }

  .bm-entry-info {
    flex: 1;
    min-width: 0;
  }
  .bm-entry-page {
    font-size: 13px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .bm-entry-note {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .bm-entry-time {
    font-size: 10px;
    color: #444;
    margin-top: 1px;
  }

  .bm-entry-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .bm-entry-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .bm-entry-btn:hover { border-color: #444; color: var(--text); }
  .bm-entry-btn.del:hover { color: var(--danger); border-color: var(--danger); }

  /* Bookmark note edit inline */
  .bm-note-input {
    width: 100%;
    padding: 4px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    font-family: inherit;
    outline: none;
    margin-top: 2px;
  }
  .bm-note-input:focus { border-color: var(--accent); }

  /* ============================================
     BOOKMARK BROWSER MODAL (shelf-level)
     ============================================ */
  .bm-browser {
    display: flex;
    flex-direction: column;
    max-height: 70vh;
  }
  .bm-browser-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bm-browser-tab {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    transition: all 0.15s;
  }
  .bm-browser-tab:hover { color: var(--text); }
  .bm-browser-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .bm-browser-body {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
    min-height: 200px;
  }

  /* All bookmarks list */
  .bm-all-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .bm-all-entry:last-child { border-bottom: none; }
  .bm-all-entry:hover { background: var(--bg-hover); }
  .bm-all-book {
    font-size: 10px;
    color: #555;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 1px;
  }
  .bm-all-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .bm-all-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .bm-all-btn:hover { border-color: #444; color: var(--text); }
  .bm-all-btn.del:hover { color: var(--danger); border-color: var(--danger); }
  .bm-all-btn.accent { color: var(--accent); }
  .bm-all-btn.accent:hover { border-color: var(--accent); }

  /* BM Lists section */
  .bmlist-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .bmlist-new-input {
    flex: 1;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .bmlist-new-input:focus { border-color: var(--accent); }
  .bmlist-new-btn {
    background: var(--accent);
    color: #111;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    flex-shrink: 0;
  }
  .bmlist-new-btn:hover { opacity: 0.85; }

  .bmlist-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .bmlist-card:hover { background: var(--bg-hover); }
  .bmlist-card-icon {
    font-size: 24px;
    flex-shrink: 0;
    width: 40px;
    text-align: center;
  }
  .bmlist-card-info { flex: 1; min-width: 0; }
  .bmlist-card-name {
    font-size: 14px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bmlist-card-count {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }
  .bmlist-card-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  /* BM List detail view (inside modal) */
  .bmlist-detail-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bmlist-detail-back {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .bmlist-detail-back:hover { color: var(--text); }
  .bmlist-detail-title {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bmlist-detail-read {
    background: var(--accent);
    color: #111;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    flex-shrink: 0;
  }
  .bmlist-detail-read:hover { opacity: 0.85; }
  .bmlist-detail-read:disabled { opacity: 0.4; cursor: default; }

  /* Draggable items in bmlist detail */
  .bmlist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .bmlist-item:last-child { border-bottom: none; }
  .bmlist-item:hover { background: var(--bg-hover); }
  .bmlist-item.dragging { opacity: 0.3; }
  .bmlist-item.drag-over { box-shadow: inset 0 -2px 0 var(--accent); }
  .bmlist-drag-handle {
    cursor: grab;
    color: #444;
    font-size: 14px;
    flex-shrink: 0;
    padding: 4px;
    user-select: none;
    touch-action: none;
  }
  .bmlist-drag-handle:active { cursor: grabbing; }
  .bmlist-item-thumb {
    width: 36px;
    height: 50px;
    background: #111;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bmlist-item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .bmlist-item-info {
    flex: 1;
    min-width: 0;
  }
  .bmlist-item-book {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bmlist-item-page {
    font-size: 10px;
    color: #555;
    margin-top: 1px;
  }
  .bmlist-item-note {
    font-size: 10px;
    color: #444;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 1px;
    font-style: italic;
  }

  /* Add-to-bmlist dropdown */
  .bm-add-dropdown {
    position: absolute;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 0;
    min-width: 160px;
    z-index: 1001;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .bm-add-dropdown-item {
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
  }
  .bm-add-dropdown-item:hover { background: var(--bg-hover); }
  .bm-add-dropdown-item.in-list { color: var(--accent); }

  /* Folder browser modal */
  .folder-tree {
    max-height: 55vh;
    overflow-y: auto;
    margin: 12px 0;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .folder-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .folder-entry:last-child { border-bottom: none; }
  .folder-entry-icon { flex-shrink: 0; opacity: 0.5; font-size: 14px; }
  .folder-entry-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-muted);
  }
  .folder-entry-name.is-folder { color: var(--text); font-weight: 500; }
  .folder-entry-indent { width: 16px; flex-shrink: 0; }
  .folder-entry-size {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-right: 4px;
  }
  .folder-entry-del {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .folder-entry-del:hover { color: var(--danger); border-color: var(--danger); }
  .folder-entry-hide {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .folder-entry-hide:hover { border-color: #444; }
  .folder-entry.hidden-entry { opacity: 0.35; }
  .folder-entry.hidden-entry .folder-entry-hide { color: var(--accent); }
  .folder-modal-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .folder-modal-path {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- ========== CONNECTION SCREEN ========== -->
<div id="connection-screen">
  <h1>BookViewer</h1>
  <div id="dbx-ui"></div>
</div>

<!-- ========== SHELF SCREEN ========== -->
<div id="shelf-screen">
  <div class="shelf-topbar">
    <h1>BookViewer</h1>
    <div class="shelf-topbar-actions">
      <button class="btn-icon" id="btn-import" title="ZIPインポート" style="font-size:12px;font-weight:500;">ZIP</button>
      <button class="btn-icon" id="btn-bm-browser" title="ブックマーク" style="font-size:15px;">🔖</button>
      <button class="btn-icon" id="btn-new-list" title="新しいリスト">＋</button>
      <button class="btn-icon" id="btn-refresh" title="再読み込み">↻</button>
      <button class="btn-icon" id="btn-settings" title="設定" style="font-size:14px;">⚙</button>
      <button class="btn-icon" id="btn-disconnect" title="接続解除">⏻</button>
    </div>
  </div>
  <div class="shelf-tabs" id="shelf-tabs"></div>
  <div class="shelf-controls" id="shelf-controls">
    <div class="shelf-control-group">
      <span class="shelf-control-label">ストア:</span>
      <button class="shelf-pill active" data-store="all">すべて</button>
      <button class="shelf-pill" data-store="dlsite">DLsite</button>
      <button class="shelf-pill" data-store="fanza">Fanza</button>
      <button class="shelf-pill" data-store="other">その他</button>
    </div>
    <div class="shelf-control-group">
      <span class="shelf-control-label">並び順:</span>
      <select class="shelf-sort-select" id="shelf-sort">
        <option value="purchase_desc">購入日 新→古</option>
        <option value="purchase_asc">購入日 古→新</option>
        <option value="lastread_desc">最近読んだ順</option>
        <option value="maker_asc">サークル名 A→Z</option>
        <option value="title_asc">タイトル A→Z</option>
        <option value="title_desc">タイトル Z→A</option>
        <option value="progress_desc">進捗 多→少</option>
        <option value="custom">カスタム（ドラッグ並替）</option>
      </select>
    </div>
    <span class="shelf-book-count" id="shelf-book-count"></span>
  </div>
  <div class="import-bar" id="import-bar"><div class="import-bar-fill" id="import-bar-fill"></div></div>
  <div class="import-status" id="import-status-text"></div>
  <div class="shelf-grid-wrap">
    <div class="shelf-grid" id="shelf-grid"></div>
  </div>
</div>

<!-- ========== READER SCREEN ========== -->
<div id="reader-screen">
  <div class="reader-topbar" id="reader-topbar">
    <button class="reader-back-btn" id="reader-back">←</button>
    <div class="reader-book-title" id="reader-title"></div>
    <button class="reader-binding-btn" id="reader-binding-btn">右綴じ</button>
    <button class="reader-bookmark-btn" id="reader-bookmark-btn" title="このページをブックマーク">🔖</button>
  </div>
  <div class="reader-canvas" id="reader-canvas">
    <div class="tap-zone tap-zone-left" id="tap-left"></div>
    <div class="tap-zone tap-zone-center" id="tap-center"></div>
    <div class="tap-zone tap-zone-right" id="tap-right"></div>
    <img id="reader-img" src="" alt="">
    <div class="reader-bookmark-indicator" id="reader-bm-indicator">🔖</div>
    <div class="reader-loading" id="reader-loading" style="display:none;">
      <div class="spinner"></div>
    </div>
  </div>
  <div class="reader-toolbar" id="reader-toolbar">
    <div class="reader-slider-row">
      <span class="reader-page-label" id="reader-page-label">1 / 1</span>
      <div class="reader-slider-wrap" id="reader-slider-wrap">
        <input type="range" class="reader-slider" id="reader-slider" min="0" max="0" value="0">
        <div class="reader-bm-dots" id="reader-bm-dots"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="reader-bm-list-btn" id="reader-bm-list-btn">📋 ブックマーク<span class="bm-count" id="bm-count"></span></button>
    </div>
  </div>

  <!-- Bookmark list panel -->
  <div class="bm-panel" id="bm-panel">
    <div class="bm-panel-header">
      <h4>ブックマーク</h4>
      <button class="bm-panel-close" id="bm-panel-close">✕</button>
    </div>
    <div class="bm-panel-list" id="bm-panel-list"></div>
  </div>
</div>

<!-- ========== CONTEXT MENU ========== -->
<div class="ctx-menu" id="ctx-menu"></div>

<!-- ========== NEW LIST MODAL ========== -->
<div class="modal-overlay" id="modal-new-list">
  <div class="modal-box">
    <h3>新しいリスト</h3>
    <input class="modal-input" id="input-list-name" placeholder="リスト名" maxlength="40">
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">キャンセル</button>
      <button class="modal-btn primary" id="modal-create">作成</button>
    </div>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>

<!-- ========== ZIP IMPORT (hidden input) ========== -->
<input type="file" id="zip-input" accept=".zip" multiple style="display:none;">

<!-- ========== FOLDER BROWSER MODAL ========== -->
<div class="modal-overlay" id="modal-folder">
  <div class="modal-box" style="width: 420px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div style="overflow:hidden;">
        <div class="folder-modal-title" id="folder-modal-title"></div>
        <div class="folder-modal-path" id="folder-modal-path"></div>
      </div>
      <button class="modal-btn" id="folder-modal-delete" style="color:var(--danger);border-color:var(--danger);flex-shrink:0;font-size:12px;">フォルダ削除</button>
    </div>
    <div class="folder-tree" id="folder-tree"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="folder-modal-close">閉じる</button>
    </div>
  </div>
</div>

<!-- ========== SETTINGS MODAL ========== -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal-box" style="width: 480px;">
    <h3>設定</h3>
    <div style="margin-top:12px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">リスト出力</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="modal-btn" id="btn-export-fav" style="font-size:11px;">ふぁぼ</button>
        <span id="export-list-btns"></span>
      </div>
    </div>
    <div style="margin-top:8px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">非表示の作品 <span id="hidden-count" style="color:#555;"></span></div>
      <div class="hidden-list" id="hidden-list"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="settings-modal-close">閉じる</button>
    </div>
  </div>
</div>

<!-- ========== BOOKMARK BROWSER MODAL ========== -->
<div class="modal-overlay" id="modal-bm-browser">
  <div class="modal-box" style="width: 520px; max-height: 80vh; display: flex; flex-direction: column; padding: 0;">
    <div style="padding: 16px 20px 0; flex-shrink: 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h3 style="margin:0;">🔖 ブックマーク</h3>
        <button class="bm-panel-close" id="bm-browser-close">✕</button>
      </div>
    </div>
    <div class="bm-browser">
      <div class="bm-browser-tabs" id="bm-browser-tabs">
        <button class="bm-browser-tab active" data-tab="all">すべて</button>
        <button class="bm-browser-tab" data-tab="lists">マイリスト</button>
      </div>
      <div class="bm-browser-body" id="bm-browser-body"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// APP STATE
// ============================================================
const App = {
  storage: null,
  metadata: null,
  currentList: 'すべて',
  currentStore: 'all',
  currentSort: 'purchase_desc',
  currentBook: null,
  currentPage: 0,
  totalPages: 0,
  pageCache: {},     // { pageNum: objectURL }
  toolbarVisible: false,
  bookFolders: [],   // raw folder list from storage
  coverCache: {},    // { bookId: objectURL }
  saving: false,
  bmListMode: null,  // name of bmList being read, or null
  bmListItems: [],   // resolved items when reading a bmList: [{ bookId, page, path }]
  bmBrowserTab: 'all',
  bmBrowserDetail: null, // name of bmList being viewed in detail, or null
};

// ============================================================
// INIT
// ============================================================
function init() {
  App.storage = new StorageBridge({
    basePath: '/BookViewer',
    storagePrefix: 'bookviewer',
    ui: true,
    uiTarget: '#dbx-ui',
  });

  App.storage.on('connected', async () => {
    showScreen('shelf');
    await loadShelf();
  });

  App.storage.on('disconnected', () => {
    showScreen('connection');
  });

  // Check if already connected
  if (App.storage.isConnected) {
    showScreen('shelf');
    loadShelf();
  }

  // Event listeners
  $('#btn-disconnect').onclick = () => App.storage.disconnect();
  $('#btn-refresh').onclick = () => loadShelf();
  $('#btn-new-list').onclick = () => showModal('modal-new-list');
  $('#modal-cancel').onclick = () => hideModal('modal-new-list');
  $('#modal-create').onclick = createNewList;
  $('#input-list-name').onkeydown = (e) => { if (e.key === 'Enter') createNewList(); };

  // Reader controls
  $('#reader-back').onclick = closeReader;
  $('#tap-left').onclick = () => tapNav('left');
  $('#tap-right').onclick = () => tapNav('right');
  $('#tap-center').onclick = toggleToolbar;
  $('#reader-slider').oninput = onSliderChange;
  $('#reader-binding-btn').onclick = toggleBinding;

  // Bookmark controls
  $('#reader-bookmark-btn').onclick = toggleCurrentBookmark;
  $('#reader-bm-list-btn').onclick = toggleBmPanel;
  $('#bm-panel-close').onclick = () => closeBmPanel();

  // Keyboard
  document.addEventListener('keydown', onKeyDown);

  // Swipe
  setupSwipe();

  // Scroll page nav
  setupScroll();

  // Context menu dismiss
  document.addEventListener('click', () => hideCtxMenu());
  window.addEventListener('blur', () => hideCtxMenu());
  window.addEventListener('resize', () => hideCtxMenu());
  document.addEventListener('scroll', () => hideCtxMenu(), true);

  // Modal overlay dismiss
  $('#modal-new-list').addEventListener('click', (e) => {
    if (e.target === $('#modal-new-list')) hideModal('modal-new-list');
  });
  $('#modal-folder').addEventListener('click', (e) => {
    if (e.target === $('#modal-folder')) hideModal('modal-folder');
  });
  $('#folder-modal-close').onclick = () => hideModal('modal-folder');

  // Settings modal
  $('#btn-settings').onclick = () => openSettingsModal();

  // Bookmark browser
  $('#btn-bm-browser').onclick = () => openBmBrowser();
  $('#bm-browser-close').onclick = () => hideModal('modal-bm-browser');
  $('#modal-bm-browser').addEventListener('click', (e) => {
    if (e.target === $('#modal-bm-browser')) hideModal('modal-bm-browser');
  });
  $('#bm-browser-tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.bm-browser-tab');
    if (!tab) return;
    App.bmBrowserTab = tab.dataset.tab;
    App.bmBrowserDetail = null;
    $$('.bm-browser-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === App.bmBrowserTab));
    renderBmBrowser();
  });

  // ZIP import
  $('#btn-import').onclick = () => $('#zip-input').click();
  $('#zip-input').onchange = onZipSelected;
  $('#modal-settings').addEventListener('click', (e) => {
    if (e.target === $('#modal-settings')) hideModal('modal-settings');
  });
  $('#settings-modal-close').onclick = () => hideModal('modal-settings');

  // Browser back/forward
  window.addEventListener('popstate', onPopState);
  // Set initial state
  history.replaceState({ screen: 'shelf' }, '');

  // Store filter pills
  document.querySelectorAll('.shelf-pill[data-store]').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.shelf-pill[data-store]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      App.currentStore = btn.dataset.store;
      renderGrid();
    };
  });

  // Sort select
  $('#shelf-sort').onchange = () => {
    App.currentSort = $('#shelf-sort').value;
    renderGrid();
  };
}

const IMG_RE = /\.(png|jpg|jpeg|webp|gif)$/i;

// Recursively list all image files under a folder path
// hiddenPaths: array of relative paths (from bookRoot) to skip
async function listImagesRecursive(folderPath, hiddenPaths) {
  const hidden = hiddenPaths || [];
  const results = [];
  const queue = [folderPath];
  while (queue.length > 0) {
    const dir = queue.shift();
    let entries;
    try { entries = await App.storage.list(dir); } catch(e) { continue; }
    for (const e of entries) {
      const fullPath = dir + '/' + e.name;
      // Check if this path is hidden (relative to folderPath)
      const rel = fullPath.slice(folderPath.length + 1);
      if (hidden.some(h => rel === h || rel.startsWith(h + '/'))) continue;
      if (e['.tag'] === 'folder') {
        queue.push(fullPath);
      } else if (e['.tag'] === 'file' && IMG_RE.test(e.name)) {
        results.push({ name: e.name, path: fullPath });
      }
    }
  }
  results.sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }));
  return results;
}

async function loadMetadata() {
  try {
    const raw = await App.storage.load('metadata.json');
    App.metadata = JSON.parse(raw);
  } catch (e) {
    // No metadata yet — create default
    App.metadata = {
      books: {},
      lists: {
        'ふぁぼ': { type: 'default', created: new Date().toISOString().slice(0, 10) }
      },
      bookmarks: {}
    };
  }
  // Ensure structure
  if (!App.metadata.books) App.metadata.books = {};
  if (!App.metadata.lists) App.metadata.lists = { 'ふぁぼ': { type: 'default', created: new Date().toISOString().slice(0, 10) } };
  if (!App.metadata.bookmarks) App.metadata.bookmarks = {};
  if (!App.metadata.hiddenBooks) App.metadata.hiddenBooks = [];
  if (!App.metadata.bmLists) App.metadata.bmLists = {};
  if (!App.metadata.lists['ふぁぼ']) App.metadata.lists['ふぁぼ'] = { type: 'default', created: new Date().toISOString().slice(0, 10) };
}

async function saveMetadata() {
  if (App.saving) return;
  App.saving = true;
  try {
    await App.storage.save('metadata.json', JSON.stringify(App.metadata, null, 2));
  } catch (e) {
    console.error('Failed to save metadata:', e);
  }
  App.saving = false;
}

// Debounced save
let saveTimer = null;
function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveMetadata, 1500);
}

async function loadShelf() {
  const grid = $('#shelf-grid');
  grid.innerHTML = '<div class="shelf-loading"><div class="spinner"></div>読み込み中...</div>';

  await loadMetadata();

  // List book folders from Dropbox
  try {
    const entries = await App.storage.list('books');
    App.bookFolders = entries.filter(e => e['.tag'] === 'folder').map(e => {
      const name = e.name || e.path_display.split('/').pop();
      return { id: name, path: 'books/' + name };
    });
  } catch (e) {
    // books folder might not exist
    App.bookFolders = [];
  }

  // Ensure each folder has metadata entry
  for (const folder of App.bookFolders) {
    if (!App.metadata.books[folder.id]) {
      App.metadata.books[folder.id] = {
        title: folder.id,
        store: '',
        purchaseDate: '',
        tags: [],
        lists: [],
        coverImage: '',
        lastReadPage: 0,
        bindingDirection: 'rtl',
        totalPages: 0,
      };
    }
  }

  // Also include metadata-only books (synced but not downloaded)
  const folderIds = new Set(App.bookFolders.map(f => f.id));
  for (const [id, meta] of Object.entries(App.metadata.books)) {
    if (!folderIds.has(id)) {
      App.bookFolders.push({ id, path: 'books/' + id, metadataOnly: true });
    }
  }

  renderTabs();
  renderGrid();
}

function renderTabs() {
  const container = $('#shelf-tabs');
  const lists = ['すべて', 'DL済み', 'ふぁぼ', ...Object.keys(App.metadata.lists).filter(k => k !== 'ふぁぼ')];
  container.innerHTML = '';
  for (const name of lists) {
    const tab = document.createElement('button');
    tab.className = 'shelf-tab' + (App.currentList === name ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => {
      App.currentList = name;
      // リスト系はカスタムソートをデフォルトに
      if (name !== 'すべて' && name !== 'DL済み') {
        App.currentSort = 'custom';
      } else if (App.currentSort === 'custom') {
        App.currentSort = 'purchase_desc';
      }
      $('#shelf-sort').value = App.currentSort;
      renderTabs();
      renderGrid();
    };
    container.appendChild(tab);
  }
}

function getFilteredBooks() {
  let books = App.bookFolders;

  // Exclude hidden books
  const hiddenSet = new Set(App.metadata.hiddenBooks || []);
  books = books.filter(f => !hiddenSet.has(f.id));

  // List filter
  if (App.currentList === 'DL済み') {
    books = books.filter(f => !f.metadataOnly);
  } else if (App.currentList !== 'すべて') {
    books = books.filter(f => {
      const meta = App.metadata.books[f.id];
      return meta && meta.lists && meta.lists.includes(App.currentList);
    });
  }

  // Store filter
  if (App.currentStore !== 'all') {
    books = books.filter(f => {
      const meta = App.metadata.books[f.id];
      const store = (meta && meta.store) || '';
      if (App.currentStore === 'other') return !store || (store !== 'dlsite' && store !== 'fanza');
      return store === App.currentStore;
    });
  }

  // Sort
  books = [...books].sort((a, b) => {
    const ma = App.metadata.books[a.id] || {};
    const mb = App.metadata.books[b.id] || {};
    switch (App.currentSort) {
      case 'purchase_desc':
        return (mb.purchaseDate || '').localeCompare(ma.purchaseDate || '');
      case 'purchase_asc':
        return (ma.purchaseDate || '').localeCompare(mb.purchaseDate || '');
      case 'lastread_desc':
        return (mb.lastReadTime || '').localeCompare(ma.lastReadTime || '');
      case 'maker_asc':
        return (ma.makerName || '').localeCompare(mb.makerName || '', 'ja');
      case 'title_asc':
        return (ma.title || a.id).localeCompare(mb.title || b.id, 'ja');
      case 'title_desc':
        return (mb.title || b.id).localeCompare(ma.title || a.id, 'ja');
      case 'progress_desc': {
        const pa = ma.totalPages > 0 ? (ma.lastReadPage || 0) / ma.totalPages : -1;
        const pb = mb.totalPages > 0 ? (mb.lastReadPage || 0) / mb.totalPages : -1;
        return pb - pa;
      }
      case 'custom': {
        const list = App.metadata.lists[App.currentList];
        const order = (list && list.order) || [];
        const ia = order.indexOf(a.id);
        const ib = order.indexOf(b.id);
        return (ia === -1 ? 9999 : ia) - (ib === -1 ? 9999 : ib);
      }
      default:
        return 0;
    }
  });

  return books;
}

function renderGrid() {
  const grid = $('#shelf-grid');
  const books = getFilteredBooks();

  // Update book count
  const countEl = $('#shelf-book-count');
  if (countEl) countEl.textContent = `${books.length}冊`;

  if (books.length === 0) {
    grid.innerHTML = `
      <div class="shelf-empty" style="grid-column: 1 / -1;">
        <div class="shelf-empty-icon">📚</div>
        <div>${App.currentList === 'すべて' ? 'Dropbox の BookViewer/books/ にフォルダを追加してください' : 'このリストは空です'}</div>
      </div>`;
    return;
  }

  grid.innerHTML = '';
  for (const book of books) {
    const meta = App.metadata.books[book.id] || {};
    const isFav = meta.lists && meta.lists.includes('ふぁぼ');
    const progress = meta.totalPages > 0 ? ((meta.lastReadPage || 0) / meta.totalPages * 100) : 0;

    // Store badge
    const store = meta.store || '';
    let badgeHtml = '';
    if (store === 'dlsite') badgeHtml = '<span class="book-badge dlsite">DLsite</span>';
    else if (store === 'fanza') badgeHtml = '<span class="book-badge fanza">Fanza</span>';
    else if (store) badgeHtml = `<span class="book-badge other">${store}</span>`;

    // Maker name
    const makerHtml = meta.makerName ? `<div class="book-maker">${meta.makerName}</div>` : '';

    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover-wrap">
        <div class="book-cover-placeholder">${meta.title || book.id}</div>
        ${badgeHtml}
        <button class="book-star ${isFav ? 'active' : ''}" data-id="${book.id}">★</button>
      </div>
      ${meta.totalPages > 0 ? `<div class="book-progress"><div class="book-progress-bar" style="width:${progress}%"></div></div>` : ''}
      <div class="book-title">${meta.title || book.id}</div>
      ${makerHtml}
    `;

    // Load cover async
    loadCover(book.id, card);

    // Dim metadata-only cards slightly
    if (book.metadataOnly) {
      card.style.opacity = '0.65';
    }

    // Click -> open reader
    card.addEventListener('click', (e) => {
      if (e.target.closest('.book-star')) return;
      if (book.metadataOnly) {
        toast('未ダウンロード');
        return;
      }
      openReader(book.id);
    });

    // Star button
    card.querySelector('.book-star').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(book.id);
    });

    // Context menu
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showCtxMenu(e.clientX, e.clientY, book.id);
    });

    // Long press for mobile
    let longTimer;
    card.addEventListener('touchstart', (e) => {
      longTimer = setTimeout(() => {
        const touch = e.touches[0];
        showCtxMenu(touch.clientX, touch.clientY, book.id);
      }, 600);
    }, { passive: true });
    card.addEventListener('touchend', () => clearTimeout(longTimer));
    card.addEventListener('touchmove', () => clearTimeout(longTimer));

    grid.appendChild(card);
  }

  // Drag reorder (カスタムソート + ユーザーリスト時のみ)
  if (App.currentSort === 'custom' && App.currentList !== 'すべて' && App.currentList !== 'DL済み') {
    setupDragReorder(grid, books);
  }
}

// ============================================================
// DRAG REORDER
// ============================================================
function setupDragReorder(grid, books) {
  let dragId = null;

  grid.querySelectorAll('.book-card').forEach((card, idx) => {
    card.draggable = true;
    card.style.cursor = 'grab';
    card.dataset.dragIdx = idx;

    card.addEventListener('dragstart', (e) => {
      dragId = books[idx].id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const dropId = books[idx].id;
      if (dragId && dragId !== dropId) {
        reorderList(App.currentList, dragId, dropId, books);
      }
    });
  });

  // Touch drag support
  let touchDragEl = null;
  let touchDragId = null;
  let touchClone = null;

  grid.addEventListener('touchstart', (e) => {
    if (App.currentSort !== 'custom') return;
    const card = e.target.closest('.book-card');
    if (!card) return;
    const idx = parseInt(card.dataset.dragIdx);
    if (isNaN(idx)) return;

    // 長押しでドラッグ開始
    const startY = e.touches[0].clientY;
    const startX = e.touches[0].clientX;
    const timer = setTimeout(() => {
      touchDragEl = card;
      touchDragId = books[idx].id;
      card.classList.add('dragging');

      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:${card.offsetWidth}px;top:${startY - 30}px;left:${startX - card.offsetWidth/2}px;`;
      document.body.appendChild(touchClone);
    }, 400);

    const cancel = () => { clearTimeout(timer); };
    card.addEventListener('touchend', cancel, { once: true });
    card.addEventListener('touchmove', (me) => {
      if (!touchDragEl) { cancel(); return; }
      me.preventDefault();
      const ty = me.touches[0].clientY;
      const tx = me.touches[0].clientX;
      if (touchClone) {
        touchClone.style.top = (ty - 30) + 'px';
        touchClone.style.left = (tx - touchClone.offsetWidth/2) + 'px';
      }
      // Highlight drop target
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      const el = document.elementFromPoint(tx, ty);
      const target = el && el.closest('.book-card');
      if (target && target !== touchDragEl) target.classList.add('drag-over');
    }, { passive: false });
  }, { passive: true });

  grid.addEventListener('touchend', (e) => {
    if (!touchDragEl) return;
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.book-card');
    if (target && target !== touchDragEl) {
      const dropIdx = parseInt(target.dataset.dragIdx);
      if (!isNaN(dropIdx)) {
        reorderList(App.currentList, touchDragId, books[dropIdx].id, books);
      }
    }
    touchDragEl.classList.remove('dragging');
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (touchClone) { touchClone.remove(); touchClone = null; }
    touchDragEl = null;
    touchDragId = null;
  });
}

function reorderList(listName, dragId, dropId, books) {
  const list = App.metadata.lists[listName];
  if (!list) return;
  // 現在の表示順をベースにorder配列を作成
  const order = books.map(b => b.id);
  const fromIdx = order.indexOf(dragId);
  const toIdx = order.indexOf(dropId);
  if (fromIdx === -1 || toIdx === -1) return;
  order.splice(fromIdx, 1);
  order.splice(toIdx, 0, dragId);
  list.order = order;
  debouncedSave();
  renderGrid();
}

const DLSITE_ID_RE = /^[RBV]J\d{6,}$/;
const FANZA_ID_RE = /^d_\d+$/;

function getStoreUrl(bookId) {
  if (DLSITE_ID_RE.test(bookId)) {
    return `https://www.dlsite.com/maniax/work/=/product_id/${bookId}.html`;
  }
  if (FANZA_ID_RE.test(bookId)) {
    return `https://www.dmm.co.jp/dc/doujin/-/detail/=/cid=${bookId}/`;
  }
  return null;
}

function getPlayUrl(bookId) {
  if (DLSITE_ID_RE.test(bookId)) {
    return `https://play.dlsite.com/work/${bookId}`;
  }
  if (FANZA_ID_RE.test(bookId)) {
    return `https://www.dmm.co.jp/dc/doujin/-/mylibrary/detail/=/product_id=${bookId}/`;
  }
  return null;
}

function getDownloadUrl(bookId) {
  if (DLSITE_ID_RE.test(bookId)) {
    return `https://www.dlsite.com/maniax/download/=/product_id/${bookId}.html`;
  }
  if (FANZA_ID_RE.test(bookId)) {
    return `https://www.dmm.co.jp/dc/-/proxy/=/transfer_type=download/shop=doujin/product_id=${bookId}/`;
  }
  return null;
}

function dlsiteDirName(workno) {
  const m = workno.match(/^([A-Z]+)(\d+)$/);
  if (!m) return null;
  const prefix = m[1], num = parseInt(m[2]);
  const rounded = (Math.floor(num / 1000) + 1) * 1000;
  return prefix + String(rounded).padStart(m[2].length, '0');
}

function fanzaImageCandidates(url) {
  // 元URL例: https://doujin-assets.dmm.co.jp/digital/comic/d_254274/d_254274pl-100x75.jpg
  // サイズなし版、大きいサイズ版、元URLの順で返す
  const base = url.replace(/pl-\d+x\d+\.jpg/, '').replace(/pl\.jpg/, '');
  const id = url.match(/(d_\d+)/)?.[1] || '';
  return [
    `${base}pl.jpg`,                    // サイズ指定なし（フルサイズ）
    url.replace(/\d+x\d+/, '560x420'),  // 大サイズ
    url.replace(/\d+x\d+/, '380x285'),  // 中サイズ
    url.replace(/\d+x\d+/, '200x150'),  // 小サイズ
    url,                                  // 元URL（最終フォールバック）
  ];
}

async function tryLoadImage(url) {
  const img = new Image();
  return new Promise(resolve => {
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = url;
  });
}

async function loadCover(bookId, card) {
  if (App.coverCache[bookId]) {
    setCoverImg(card, App.coverCache[bookId]);
    return;
  }

  // DLsite作品: 複数URLパターンを試行
  if (DLSITE_ID_RE.test(bookId)) {
    const dir = dlsiteDirName(bookId);
    const candidates = [
      `https://img.dlsite.jp/modpub/images2/work/doujin/${dir}/${bookId}_img_main.jpg`,
      `https://img.dlsite.jp/modpub/images2/work/doujin/${dir}/${bookId}_img_main_240x240.jpg`,
      `https://img.dlsite.jp/${bookId}_img_main_300x300.jpg`,
    ];
    for (const url of candidates) {
      if (await tryLoadImage(url)) {
        App.coverCache[bookId] = url;
        setCoverImg(card, url);
        autoFetchDLsiteMeta(bookId);
        return;
      }
    }
  }

  // Fanza作品: メタデータのimageSrcから読み込み（複数サイズ試行）
  if (FANZA_ID_RE.test(bookId)) {
    const meta = App.metadata.books[bookId];
    if (meta && meta.imageSrc) {
      const candidates = fanzaImageCandidates(meta.imageSrc);
      for (const url of candidates) {
        if (await tryLoadImage(url)) {
          App.coverCache[bookId] = url;
          setCoverImg(card, url);
          return;
        }
      }
    }
  }

  // Dropboxから読み込み (フォールバック — フォルダがある本のみ)
  const bookEntry = App.bookFolders.find(f => f.id === bookId);
  if (bookEntry && bookEntry.metadataOnly) return;

  try {
    const meta = App.metadata.books[bookId];
    const images = await listImagesRecursive('books/' + bookId, meta && meta.hiddenPaths);

    if (images.length === 0) return;

    if (App.metadata.books[bookId]) {
      App.metadata.books[bookId].totalPages = images.length;
      if (!App.metadata.books[bookId].coverImage) {
        App.metadata.books[bookId].coverImage = images[0].path;
      }
    }

    const coverPath = (meta && meta.coverImage && images.find(i => i.path === meta.coverImage))
      ? meta.coverImage : images[0].path;
    const buf = await App.storage.loadBinary(coverPath);
    const ext = coverPath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    const url = URL.createObjectURL(blob);
    App.coverCache[bookId] = url;
    setCoverImg(card, url);
  } catch (e) {
    console.warn('Cover load failed for', bookId, e);
  }
}

// DLsite作品のタイトル・タグを自動取得
async function autoFetchDLsiteMeta(bookId) {
  const meta = App.metadata.books[bookId];
  if (!meta) return;
  // タイトルがID以外に設定済みなら不要
  if (meta.title && meta.title !== bookId) return;

  try {
    const resp = await fetch('https://play.dlsite.com/api/works', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify([bookId]),
      credentials: 'include',
    });
    if (!resp.ok) return;
    const data = await resp.json();
    const works = data.works || data;
    if (!Array.isArray(works) || works.length === 0) return;

    const w = works.find(x => x.workno === bookId) || works[0];
    const title = w.work_name || w.name?.ja || w.title;
    if (title) {
      meta.title = title;
      meta.store = 'dlsite';
      meta.dlsiteId = bookId;
      // タグ
      if (w.genre && Array.isArray(w.genre)) {
        const tags = ['同人'];
        for (const g of w.genre) {
          const t = (typeof g === 'string') ? g : (g.name || g.name_ja || g.text);
          if (t && !tags.includes(t)) tags.push(t);
        }
        meta.tags = tags;
      }
      debouncedSave();
      // UIにタイトル反映
      renderGrid();
    }
  } catch (e) {
    // CORSブロック等で失敗するのは想定内。Pythonパイプライン側で対応
  }
}

function setCoverImg(card, url) {
  const placeholder = card.querySelector('.book-cover-placeholder');
  if (placeholder) {
    const img = document.createElement('img');
    img.className = 'book-cover';
    img.src = url;
    placeholder.replaceWith(img);
  }
}

// ============================================================
// FAVORITES & LISTS
// ============================================================
function toggleFav(bookId) {
  const meta = App.metadata.books[bookId];
  if (!meta) return;
  if (!meta.lists) meta.lists = [];
  const idx = meta.lists.indexOf('ふぁぼ');
  if (idx >= 0) {
    meta.lists.splice(idx, 1);
    toast('ふぁぼから削除');
  } else {
    meta.lists.push('ふぁぼ');
    toast('ふぁぼに追加');
  }
  debouncedSave();
  renderGrid();
}

function addToList(bookId, listName) {
  const meta = App.metadata.books[bookId];
  if (!meta) return;
  if (!meta.lists) meta.lists = [];
  if (!meta.lists.includes(listName)) {
    meta.lists.push(listName);
    toast(`「${listName}」に追加`);
    debouncedSave();
  }
}

function removeFromList(bookId, listName) {
  const meta = App.metadata.books[bookId];
  if (!meta || !meta.lists) return;
  const idx = meta.lists.indexOf(listName);
  if (idx >= 0) {
    meta.lists.splice(idx, 1);
    toast(`「${listName}」から削除`);
    debouncedSave();
    renderGrid();
  }
}

async function createNewList() {
  const name = $('#input-list-name').value.trim();
  if (!name) return;
  if (name === 'すべて' || name === 'ふぁぼ' || App.metadata.lists[name]) {
    toast('この名前は使えません');
    return;
  }
  App.metadata.lists[name] = { type: 'user', created: new Date().toISOString().slice(0, 10) };
  await saveMetadata();
  hideModal('modal-new-list');
  renderTabs();
  toast(`「${name}」を作成`);
}

// ============================================================
// HIDE / UNHIDE BOOKS
// ============================================================
function hideBook(bookId) {
  if (!App.metadata.hiddenBooks) App.metadata.hiddenBooks = [];
  if (!App.metadata.hiddenBooks.includes(bookId)) {
    App.metadata.hiddenBooks.push(bookId);
    const meta = App.metadata.books[bookId];
    const title = (meta && meta.title) || bookId;
    toast(`「${title}」を非表示にしました`);
    debouncedSave();
    renderGrid();
  }
}

function unhideBook(bookId) {
  if (!App.metadata.hiddenBooks) return;
  const idx = App.metadata.hiddenBooks.indexOf(bookId);
  if (idx >= 0) {
    App.metadata.hiddenBooks.splice(idx, 1);
    const meta = App.metadata.books[bookId];
    const title = (meta && meta.title) || bookId;
    toast(`「${title}」を再表示しました`);
    debouncedSave();
    renderGrid();
  }
}

function openSettingsModal() {
  const list = $('#hidden-list');
  const hidden = App.metadata.hiddenBooks || [];
  const countEl = $('#hidden-count');
  if (countEl) countEl.textContent = hidden.length > 0 ? `(${hidden.length}件)` : '';

  if (hidden.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:11px;padding:12px 0;text-align:center;">非表示の作品はありません</div>';
  } else {
    list.innerHTML = '';
    for (const id of hidden) {
      const meta = App.metadata.books[id] || {};
      const row = document.createElement('div');
      row.className = 'hidden-entry';
      row.innerHTML = `
        <span class="hidden-entry-title">${meta.title || id}</span>
        <span class="hidden-entry-store">${meta.store || ''}</span>
        <button class="hidden-entry-restore">再表示</button>
      `;
      row.querySelector('.hidden-entry-restore').onclick = () => {
        unhideBook(id);
        openSettingsModal();
      };
      list.appendChild(row);
    }
  }

  // エクスポートボタン
  $('#btn-export-fav').onclick = () => exportList('ふぁぼ');
  const extraBtns = $('#export-list-btns');
  extraBtns.innerHTML = '';
  for (const name of Object.keys(App.metadata.lists).filter(k => k !== 'ふぁぼ')) {
    const btn = document.createElement('button');
    btn.className = 'modal-btn';
    btn.style.fontSize = '11px';
    btn.textContent = name;
    btn.onclick = () => exportList(name);
    extraBtns.appendChild(btn);
  }

  showModal('modal-settings');
}

function exportList(listName) {
  const books = Object.entries(App.metadata.books)
    .filter(([id, meta]) => meta.lists && meta.lists.includes(listName));

  if (books.length === 0) {
    toast(`「${listName}」は空です`);
    return;
  }

  // カスタム順があればそれに従う
  const listData = App.metadata.lists[listName];
  const order = (listData && listData.order) || [];
  if (order.length > 0) {
    books.sort((a, b) => {
      const ia = order.indexOf(a[0]);
      const ib = order.indexOf(b[0]);
      return (ia === -1 ? 9999 : ia) - (ib === -1 ? 9999 : ib);
    });
  }

  let text = `# ${listName}（${books.length}作品）\n`;
  text += `# 出力日: ${new Date().toLocaleDateString('ja-JP')}\n\n`;

  for (const [id, meta] of books) {
    const title = meta.title || id;
    const maker = meta.makerName || '';
    const store = meta.store || '';
    const url = getStoreUrl(id) || '';
    text += `${title}\n`;
    if (maker) text += `  サークル: ${maker}\n`;
    if (store) text += `  ストア: ${store}\n`;
    if (url) text += `  ${url}\n`;
    text += `\n`;
  }

  // ダウンロード
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${listName}_${new Date().toISOString().slice(0, 10)}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`「${listName}」をエクスポートしました`);
}

// ============================================================
// CONTEXT MENU
// ============================================================
function showCtxMenu(x, y, bookId) {
  const menu = $('#ctx-menu');
  const meta = App.metadata.books[bookId] || {};
  const isFav = meta.lists && meta.lists.includes('ふぁぼ');

  let html = `
    <div class="ctx-item" data-action="fav">${isFav ? '★ ふぁぼ解除' : '☆ ふぁぼに追加'}</div>
  `;

  // User lists
  const userLists = Object.keys(App.metadata.lists).filter(k => k !== 'ふぁぼ');
  for (const listName of userLists) {
    const inList = meta.lists && meta.lists.includes(listName);
    html += `<div class="ctx-item" data-action="${inList ? 'removelist' : 'addlist'}" data-list="${listName}">${inList ? '✓ ' : ''}${listName}</div>`;
  }

  // Remove from current list (if viewing a user list)
  if (App.currentList !== 'すべて' && App.currentList !== 'DL済み') {
    html += `<div class="ctx-item danger" data-action="removecurrent">このリストから削除</div>`;
  }

  // Delete book
  html += `<div class="ctx-item" data-action="folder">フォルダ</div>`;
  html += `<div class="ctx-item" data-action="hide" style="color:#888;">非表示</div>`;

  // Store links
  const storeUrl = getStoreUrl(bookId);
  const dlUrl = getDownloadUrl(bookId);
  if (storeUrl || dlUrl) {
    html += `<div class="ctx-divider"></div>`;
    if (dlUrl) html += `<div class="ctx-item" data-action="download" style="color:var(--accent);">ダウンロード ↗</div>`;
    if (storeUrl) html += `<div class="ctx-item" data-action="store">作品ページ ↗</div>`;
  }

  menu.innerHTML = html;

  // Position
  const mw = 200, mh = menu.scrollHeight || 200;
  const left = Math.min(x, window.innerWidth - mw - 10);
  const top = Math.min(y, window.innerHeight - mh - 10);
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
  menu.classList.add('show');

  // Handlers
  menu.querySelectorAll('.ctx-item').forEach(item => {
    item.onclick = (e) => {
      e.stopPropagation();
      const action = item.dataset.action;
      if (action === 'fav') toggleFav(bookId);
      else if (action === 'addlist') addToList(bookId, item.dataset.list);
      else if (action === 'removelist') removeFromList(bookId, item.dataset.list);
      else if (action === 'removecurrent') removeFromList(bookId, App.currentList);
      else if (action === 'folder') openFolderBrowser(bookId);
      else if (action === 'hide') hideBook(bookId);
      else if (action === 'store') { const u = getStoreUrl(bookId); if (u) window.open(u, '_blank'); }
      else if (action === 'download') { const u = getDownloadUrl(bookId); if (u) window.open(u, '_blank'); }
      hideCtxMenu();
    };
  });
}

function hideCtxMenu() {
  $('#ctx-menu').classList.remove('show');
}

async function deleteBook(bookId) {
  const meta = App.metadata.books[bookId] || {};
  const title = meta.title || bookId;
  if (!confirm(`「${title}」をDropboxから完全に削除しますか？\nこの操作は取り消せません。`)) return;

  toast('削除中...');
  try {
    await App.storage.delete('books/' + bookId);
  } catch (e) {
    console.error('Failed to delete folder:', e);
    toast('フォルダ削除に失敗しました');
    return;
  }

  // Remove from metadata
  delete App.metadata.books[bookId];
  await saveMetadata();

  // Remove from local state
  App.bookFolders = App.bookFolders.filter(f => f.id !== bookId);
  if (App.coverCache[bookId]) {
    URL.revokeObjectURL(App.coverCache[bookId]);
    delete App.coverCache[bookId];
  }

  renderGrid();
  toast(`「${title}」を削除しました`);
}
