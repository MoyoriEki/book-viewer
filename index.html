<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Filer">
<title>Dropbox Filer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%23111114'/%3E%3Cpath d='M128 160h256v32H128zm0 80h256v32H128zm0 80h192v32H128z' fill='%236ea8fe'/%3E%3Crect x='320' y='280' width='80' height='80' rx='8' fill='%236ea8fe' opacity='.4'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%23111114'/%3E%3Cpath d='M128 160h256v32H128zm0 80h256v32H128zm0 80h192v32H128z' fill='%236ea8fe'/%3E%3Crect x='320' y='280' width='80' height='80' rx='8' fill='%236ea8fe' opacity='.4'/%3E%3C/svg%3E">
<script>
// ── Inline PWA Manifest ──
const manifest = {
  name: 'Dropbox Filer',
  short_name: 'Filer',
  start_url: location.pathname,
  display: 'standalone',
  background_color: '#111114',
  theme_color: '#111114',
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%23111114'/%3E%3Cpath d='M128 160h256v32H128zm0 80h256v32H128zm0 80h192v32H128z' fill='%236ea8fe'/%3E%3Crect x='320' y='280' width='80' height='80' rx='8' fill='%236ea8fe' opacity='.4'/%3E%3C/svg%3E",
    sizes: '512x512',
    type: 'image/svg+xml',
    purpose: 'any maskable'
  }]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const manifestUrl = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestUrl;
document.head.appendChild(link);

// ── Inline Service Worker → separate file ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
<link rel="stylesheet" href="https://moyorieki.github.io/storage-bridge/storage-bridge.css">
<script src="https://moyorieki.github.io/storage-bridge/storage-bridge.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap');

:root {
  --bg: #111114;
  --bg-raised: #19191e;
  --bg-hover: #222228;
  --bg-selected: #2a2a35;
  --text: #d8d8e0;
  --text-muted: #6e6e80;
  --accent: #6ea8fe;
  --accent-dim: rgba(110,168,254,0.12);
  --accent-strong: #4d94ff;
  --border: #28282e;
  --border-light: #35353e;
  --danger: #e85050;
  --danger-dim: rgba(232,80,80,0.12);
  --radius: 6px;
  --radius-lg: 10px;
  --toolbar-h: 44px;
  --sidebar-w: 200px;
  --thumb-size: 160;
  --sb-accent: #6ea8fe;
  --sb-bg: #19191e;
  --sb-text: #d8d8e0;
  --sb-border: #28282e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 13px; line-height: 1.5;
  -webkit-tap-highlight-color: transparent; user-select: none;
  touch-action: manipulation;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

#connection-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100dvh; gap: 20px; padding: 24px; text-align: center;
}
#connection-screen h1 { font-size: 22px; font-weight: 600; }
#connection-screen p { color: var(--text-muted); max-width: 360px; font-size: 13px; }

#app { display: none; height: 100dvh; flex-direction: column; }
#app.active { display: flex; }

/* ── Toolbar ───────────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; gap: 6px;
  height: var(--toolbar-h); min-height: var(--toolbar-h);
  padding: 0 10px; background: var(--bg-raised);
  border-bottom: 1px solid var(--border); z-index: 20;
}
.tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border: none; border-radius: var(--radius);
  background: transparent; color: var(--text); cursor: pointer; font-size: 16px;
  transition: background 0.1s; flex-shrink: 0;
}
.tb-btn:hover { background: var(--bg-hover); }
.tb-btn.disabled { opacity: 0.3; pointer-events: none; }
.tb-btn.active { background: var(--accent-dim); color: var(--accent); }

#breadcrumb {
  display: flex; align-items: center; gap: 2px;
  flex: 1; min-width: 0; overflow-x: auto; overflow-y: hidden;
  padding: 0 4px; font-size: 12.5px; white-space: nowrap; scrollbar-width: none;
}
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item { padding: 3px 7px; border-radius: 4px; cursor: pointer; color: var(--text-muted); flex-shrink: 0; }
.bc-item:hover { background: var(--bg-hover); color: var(--text); }
.bc-item.current { color: var(--text); font-weight: 500; cursor: default; }
.bc-item.current:hover { background: transparent; }
.bc-sep { color: var(--border-light); flex-shrink: 0; font-size: 11px; }

#thumb-slider { width: 80px; height: 3px; accent-color: var(--accent); cursor: pointer; opacity: 0.7; }
#thumb-slider:hover { opacity: 1; }
.tb-spacer { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

#sort-select {
  background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-muted); font-family: inherit; font-size: 11.5px; padding: 3px 6px;
  cursor: pointer; outline: none; flex-shrink: 0;
}
#sort-select option { background: var(--bg-raised); color: var(--text); }

/* Selection count badge */
#sel-badge {
  display: none; padding: 2px 10px; border-radius: 12px; font-size: 11.5px;
  background: var(--accent-dim); color: var(--accent); font-weight: 500; flex-shrink: 0;
}
#sel-badge.show { display: block; }

/* ── Body ──────────────────────────────────────────────── */
#body { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-raised); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar.hidden { display: none; }
#sidebar-header { padding: 10px 12px 6px; font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
#fav-list { flex: 1; overflow-y: auto; padding: 2px 6px 10px; }
.fav-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; font-size: 12.5px; color: var(--text); }
.fav-item:hover { background: var(--bg-hover); }
.fav-item.active { background: var(--accent-dim); color: var(--accent); }
.fav-item .fav-icon { font-size: 14px; flex-shrink: 0; }
.fav-item .fav-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fav-item .fav-remove { display: none; width: 18px; height: 18px; border: none; border-radius: 3px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; align-items: center; justify-content: center; }
.fav-item:hover .fav-remove { display: flex; }
.fav-item .fav-remove:hover { background: var(--danger-dim); color: var(--danger); }
#sidebar-footer { padding: 8px; border-top: 1px solid var(--border); }
#sidebar-footer button { width: 100%; padding: 5px; border: none; border-radius: var(--radius); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; font-size: 11.5px; }
#sidebar-footer button:hover { background: var(--bg-hover); color: var(--text); }

/* ── Main ──────────────────────────────────────────────── */
#main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 10px 40vh; position: relative; }

/* ── Grid ──────────────────────────────────────────────── */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(calc(var(--thumb-size) * 1px), 1fr));
  gap: 6px;
}
.grid-item {
  display: flex; flex-direction: column; align-items: center;
  border-radius: var(--radius); cursor: pointer; padding: 4px;
  transition: background 0.1s; position: relative;
}
.grid-item:hover { background: var(--bg-hover); }
.grid-item.selected { background: var(--accent-dim); outline: 1.5px solid var(--accent); outline-offset: -1.5px; }
.grid-item.dragging { opacity: 0.25; }

/* Checkbox */
.grid-check {
  position: absolute; top: 6px; left: 6px; z-index: 3;
  width: 20px; height: 20px; border-radius: 4px;
  border: 1.5px solid rgba(255,255,255,0.35);
  background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.1s; cursor: pointer;
  font-size: 13px; color: #fff; line-height: 1;
}
.grid-item:hover .grid-check, .grid-item.selected .grid-check { opacity: 1; }
@media (hover: none) { .grid-check { opacity: 0.7; } }
.grid-item.selected .grid-check { background: var(--accent); border-color: var(--accent); }

/* Rubber-band selection */
#lasso {
  position: fixed; border: 1.5px solid var(--accent);
  background: rgba(110,168,254,0.08); z-index: 15;
  pointer-events: none; display: none;
}
.grid-item.drag-over-before::before,
.grid-item.drag-over-after::after {
  content: ''; position: absolute; top: 4px; bottom: 4px; width: 3px;
  background: var(--accent); border-radius: 2px; z-index: 5;
}
.grid-item.drag-over-before::before { left: -3px; }
.grid-item.drag-over-after::after { right: -3px; }

.grid-thumb {
  width: 100%; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; overflow: hidden; background: var(--bg); position: relative;
}
.grid-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
.folder-preview {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  width: 100%; height: 100%; gap: 1px; background: var(--border);
  border-radius: 4px; overflow: hidden; position: relative;
}
.folder-preview .fp-cell { background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.folder-preview .fp-cell img { width: 100%; height: 100%; object-fit: cover; }
.folder-preview .fp-cell .fp-empty { color: var(--text-muted); font-size: 10px; opacity: 0.2; }
.folder-badge {
  position: absolute; bottom: 3px; right: 3px; z-index: 2;
  width: 30px; height: 30px; border-radius: 6px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; pointer-events: none;
}
.grid-thumb .folder-icon { font-size: calc(var(--thumb-size) * 0.35px); color: var(--accent); opacity: 0.7; }
.grid-thumb .file-icon { font-size: calc(var(--thumb-size) * 0.22px); color: var(--text-muted); opacity: 0.5; }
.grid-thumb .loading-spinner { width: 20px; height: 20px; border: 2px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.grid-name { margin-top: 3px; font-size: 11px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); padding: 0 2px; }
.grid-item:hover .grid-name, .grid-item.selected .grid-name { color: var(--text); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 8px; color: var(--text-muted); font-size: 13px; }
.empty-state .empty-icon { font-size: 36px; opacity: 0.4; }
#loading-overlay { display: none; position: absolute; inset: 0; background: var(--bg); z-index: 10; align-items: center; justify-content: center; }
#loading-overlay.active { display: flex; }

/* Touch drag clone */
.touch-drag-clone { position: fixed; z-index: 999; pointer-events: none; opacity: 0.8; transform: scale(0.85); border: 2px solid var(--accent); border-radius: var(--radius); background: var(--bg-raised); }

/* ── Context Menu ──────────────────────────────────────── */
#ctx-menu { display: none; position: fixed; z-index: 200; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 180px; }
#ctx-menu.show { display: block; }
.ctx-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; font-size: 12.5px; color: var(--text); }
.ctx-item:hover { background: var(--bg-hover); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: var(--danger-dim); }
.ctx-item .ctx-icon { width: 16px; text-align: center; font-size: 13px; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

/* ── Image Viewer ──────────────────────────────────────── */
#viewer { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; }
#viewer.active { display: flex; }
#viewer-topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 110; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: linear-gradient(rgba(0,0,0,0.7), transparent); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
#viewer-topbar.visible { opacity: 1; pointer-events: auto; }
#viewer-title { flex: 1; font-size: 13px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.viewer-btn { width: 36px; height: 36px; border: none; border-radius: var(--radius); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.viewer-btn:hover { background: rgba(255,255,255,0.2); }
#viewer-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
#viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; }
#viewer-img.loading { opacity: 0; }
.tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 105; cursor: pointer; }
.tap-zone.left { left: 0; } .tap-zone.right { right: 0; }
.tap-zone.center { left: 30%; width: 40%; cursor: default; }
#viewer-bottombar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 110; display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
#viewer-bottombar.visible { opacity: 1; pointer-events: auto; }
#viewer-slider { flex: 1; height: 3px; accent-color: var(--accent); cursor: pointer; }
#viewer-page-label { font-size: 12px; color: rgba(255,255,255,0.7); min-width: 60px; text-align: right; }

/* ── Modals ────────────────────────────────────────────── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; width: 90%; max-width: 380px; }
.modal-box.wide { max-width: 520px; }
.modal-box h3 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
.modal-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.modal-btn { padding: 6px 16px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 13px; cursor: pointer; }
.modal-btn.primary { background: var(--accent); color: #000; font-weight: 500; }
.modal-btn.primary:hover { background: var(--accent-strong); }
.modal-btn.cancel { background: var(--bg-hover); color: var(--text); }
.modal-btn.cancel:hover { background: var(--bg-selected); }

.preset-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.preset-row label { font-size: 12px; color: var(--text-muted); min-width: 70px; }
.preset-select, .preset-input {
  flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text); font-family: inherit; font-size: 12.5px; outline: none;
}
.preset-select:focus, .preset-input:focus { border-color: var(--accent); }
#rename-preview { max-height: 240px; overflow-y: auto; margin: 10px 0; border: 1px solid var(--border); border-radius: var(--radius); font-size: 11.5px; }
.rp-row { display: flex; padding: 4px 10px; gap: 8px; border-bottom: 1px solid var(--border); }
.rp-row:last-child { border-bottom: none; }
.rp-old { flex: 1; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rp-arrow { color: var(--accent); flex-shrink: 0; }
.rp-new { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Toast ─────────────────────────────────────────────── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: var(--radius); background: var(--bg-raised); border: 1px solid var(--border); color: var(--text); font-size: 12.5px; z-index: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
#toast.show { opacity: 1; }

/* ── Responsive ────────────────────────────────────────── */
@media (display-mode: standalone) {
  #toolbar { padding-top: env(safe-area-inset-top); height: calc(var(--toolbar-h) + env(safe-area-inset-top)); }
  #viewer-bottombar { padding-bottom: env(safe-area-inset-bottom); }
}
@media (max-width: 700px) {
  #sidebar { display: none; }
  #sidebar.mobile-open { display: flex !important; position: fixed; top: var(--toolbar-h); left: 0; bottom: 0; z-index: 50; box-shadow: 4px 0 20px rgba(0,0,0,0.5); width: var(--sidebar-w); min-width: var(--sidebar-w); border-right: 1px solid var(--border); }
  #main { padding: 6px; }
}
</style>
</head>
<body>

<div id="connection-screen"><h1>Dropbox Filer</h1><p>Dropbox上のファイルをブラウズ・管理するファイラー</p><div id="dbx-ui"></div></div>

<div id="app">
  <div id="toolbar">
    <button class="tb-btn" id="btn-sidebar" title="サイドバー">☰</button>
    <button class="tb-btn" id="btn-back" title="戻る">←</button>
    <button class="tb-btn" id="btn-forward" title="進む">→</button>
    <button class="tb-btn" id="btn-up" title="上のフォルダ">↑</button>
    <div id="breadcrumb"></div>
    <span id="sel-badge"></span>
    <select id="sort-select">
      <option value="name_asc">名前 ↑</option>
      <option value="name_desc">名前 ↓</option>
      <option value="date_desc">更新日 ↓</option>
      <option value="date_asc">更新日 ↑</option>
      <option value="size_desc">サイズ ↓</option>
      <option value="size_asc">サイズ ↑</option>
    </select>
    <div class="tb-spacer"></div>
    <input type="range" id="thumb-slider" min="80" max="320" value="160" title="サムネサイズ">
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="btn-select-all" title="全選択">☑</button>
    <button class="tb-btn" id="btn-undo" title="リネーム取消" style="display:none">↩</button>
    <button class="tb-btn" id="btn-refresh" title="更新">⟳</button>
    <button class="tb-btn" id="btn-disconnect" title="切断">⏻</button>
  </div>
  <div id="body">
    <div id="sidebar"><div id="sidebar-header">お気に入り</div><div id="fav-list"></div><div id="sidebar-footer"><button id="btn-add-fav">＋ 現在のフォルダを追加</button></div></div>
    <div id="main"><div id="loading-overlay"><div class="loading-spinner" style="width:28px;height:28px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite"></div></div><div id="grid"></div></div>
  </div>
</div>

<div id="viewer">
  <div id="viewer-topbar"><span id="viewer-title"></span><button class="viewer-btn" id="viewer-close" title="閉じる">✕</button></div>
  <div id="viewer-img-wrap"><div class="tap-zone left" id="tap-left"></div><div class="tap-zone center" id="tap-center"></div><div class="tap-zone right" id="tap-right"></div><img id="viewer-img" src="" alt=""></div>
  <div id="viewer-bottombar"><input type="range" id="viewer-slider" min="0" max="0" value="0"><span id="viewer-page-label"></span></div>
</div>
<div id="ctx-menu"></div>

<div class="modal-overlay" id="modal-rename"><div class="modal-box"><h3>名前の変更</h3><input class="modal-input" id="rename-input" type="text" autocomplete="off"><div class="modal-actions"><button class="modal-btn cancel" id="rename-cancel">キャンセル</button><button class="modal-btn primary" id="rename-ok">変更</button></div></div></div>

<div class="modal-overlay" id="modal-batch-rename"><div class="modal-box wide">
  <h3>連番リネーム（<span id="batch-count"></span>件）</h3>
  <div class="preset-row"><label>プリセット</label><select class="preset-select" id="preset-select"><option value="nnn">001.ext</option><option value="nn">01.ext</option><option value="prefix_nnn">接頭辞_001.ext</option><option value="custom">カスタム</option></select></div>
  <div class="preset-row" id="prefix-row" style="display:none"><label>接頭辞</label><input class="preset-input" id="prefix-input" placeholder="例: ネーム" autocomplete="off"></div>
  <div class="preset-row" id="custom-row" style="display:none"><label>パターン</label><input class="preset-input" id="custom-input" placeholder="{NNN}.{ext}" autocomplete="off"></div>
  <div id="rename-preview"></div>
  <div class="modal-actions"><button class="modal-btn cancel" id="batch-cancel">キャンセル</button><button class="modal-btn primary" id="batch-exec">実行</button></div>
</div></div>

<div id="toast"></div>
<div id="lasso"></div>

<script>
'use strict';

const App = {
  storage: null, currentPath: '', entries: [], favorites: [],
  thumbCache: {}, sortMode: 'name_asc', thumbSize: 160,
  viewerImages: [], viewerIndex: 0, viewerVisible: false, toolbarTimer: null,
  prefetchCache: {}, navGen: 0,
  // Selection & reorder
  selected: new Set(),
  customOrders: {},    // { path: [names] }
  undoHistory: null,
};

const THUMB_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','tiff','tif','ppm']);
const IMG_EXT = new Set(['jpg','jpeg','png','gif','webp','bmp','tiff','tif','svg']);

// ── Natural Sort ──
function naturalCmp(a, b) {
  const an = natChunks(a), bn = natChunks(b);
  for (let i = 0, len = Math.min(an.length, bn.length); i < len; i++) {
    const ac = an[i], bc = bn[i];
    if (ac.n !== null && bc.n !== null) { if (ac.n !== bc.n) return ac.n - bc.n; }
    else if (ac.n !== null) return -1;
    else if (bc.n !== null) return 1;
    else { const c = ac.s.localeCompare(bc.s, 'ja', { sensitivity: 'base' }); if (c) return c; }
  }
  return an.length - bn.length;
}
function natChunks(s) { const r = [], re = /(\d+)|(\D+)/g; let m; while ((m = re.exec(s))) r.push(m[1] !== undefined ? { n: parseInt(m[1]), s: m[1] } : { n: null, s: m[2] }); return r; }

// ── IndexedDB ──
const IDB = {
  db: null,
  async open() { return new Promise((res, rej) => { const r = indexedDB.open('DropboxFiler', 2); r.onupgradeneeded = e => { const db = e.target.result; ['thumbs','settings','folderPreviews'].forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s); }); }; r.onsuccess = e => { IDB.db = e.target.result; res(); }; r.onerror = () => rej(r.error); }); },
  async get(s, k) { return new Promise(r => { try { const tx = IDB.db.transaction(s,'readonly'); const q = tx.objectStore(s).get(k); q.onsuccess = () => r(q.result); q.onerror = () => r(); } catch(_) { r(); } }); },
  async put(s, k, v) { return new Promise(r => { try { const tx = IDB.db.transaction(s,'readwrite'); tx.objectStore(s).put(v, k); tx.oncomplete = () => r(); tx.onerror = () => r(); } catch(_) { r(); } }); },
};

// ── Dropbox Thumbnail ──
function dbxArg(o) { return JSON.stringify(o).replace(/[\u0080-\uFFFF]/g, c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0')); }
async function fetchThumbnail(p, sz) { const r = await fetch('https://content.dropboxapi.com/2/files/get_thumbnail_v2', { method: 'POST', headers: { 'Authorization': 'Bearer ' + App.storage.getToken(), 'Dropbox-API-Arg': dbxArg({ resource: { '.tag': 'path', path: p }, format: 'jpeg', size: sz || 'w256h256', mode: 'bestfit' }) } }); if (!r.ok) throw new Error(r.status); return r.blob(); }

// ── Helpers ──
const $ = s => document.querySelector(s);
function ext(n) { const i = n.lastIndexOf('.'); return i > 0 ? n.slice(i+1).toLowerCase() : ''; }
function baseName(p) { return p.split('/').pop(); }
function parentPath(p) { const a = p.split('/'); a.pop(); return a.join('/'); }
function toast(m) { const e = $('#toast'); e.textContent = m; e.classList.add('show'); clearTimeout(e._t); e._t = setTimeout(() => e.classList.remove('show'), 2200); }
function entryRelPath(entry) { const a = entry.path_display || entry.path_lower || ''; return a.startsWith('/') ? a.slice(1) : a; }

// ── Thumb Queue ──
const TQ = { running: 0, max: 6, q: [] };
function tqRun(fn) { return new Promise((res, rej) => { const exec = () => { TQ.running++; fn().then(res, rej).finally(() => { TQ.running--; if (TQ.q.length) TQ.q.shift()(); }); }; TQ.running < TQ.max ? exec() : TQ.q.push(exec); }); }

// ── Settings Sync (Dropbox + IDB) ──
const SETTINGS_PATH = 'DropboxFiler-settings.json';
let settingsSaveTimer = null;

async function loadSettings() {
  // Try Dropbox first, fall back to IDB
  let cloud = null;
  try {
    const raw = await App.storage.load(SETTINGS_PATH);
    cloud = JSON.parse(raw);
  } catch(_) {}

  const local = {
    thumbSize: await IDB.get('settings','thumbSize'),
    sortMode: await IDB.get('settings','sortMode'),
    favorites: await IDB.get('settings','favorites'),
    lastPath: await IDB.get('settings','lastPath'),
    sidebarHidden: await IDB.get('settings','sidebarHidden'),
    customOrders: await IDB.get('settings','customOrders'),
  };

  // Cloud wins if present, otherwise local
  const s = cloud || {};
  const merged = {
    thumbSize: s.thumbSize ?? local.thumbSize ?? 160,
    sortMode: s.sortMode ?? local.sortMode ?? 'name_asc',
    favorites: s.favorites ?? local.favorites ?? [],
    lastPath: s.lastPath ?? local.lastPath ?? '',
    sidebarHidden: s.sidebarHidden ?? local.sidebarHidden ?? false,
    customOrders: s.customOrders ?? local.customOrders ?? {},
  };

  // Write merged back to IDB
  IDB.put('settings','thumbSize', merged.thumbSize);
  IDB.put('settings','sortMode', merged.sortMode);
  IDB.put('settings','favorites', merged.favorites);
  IDB.put('settings','lastPath', merged.lastPath);
  IDB.put('settings','sidebarHidden', merged.sidebarHidden);
  IDB.put('settings','customOrders', merged.customOrders);

  return merged;
}

function saveSettings() {
  // Debounced save to Dropbox
  clearTimeout(settingsSaveTimer);
  settingsSaveTimer = setTimeout(async () => {
    try {
      const data = {
        thumbSize: App.thumbSize,
        sortMode: App.sortMode,
        favorites: App.favorites,
        lastPath: App.currentPath,
        sidebarHidden: $('#sidebar').classList.contains('hidden'),
        customOrders: App.customOrders || {},
      };
      await App.storage.save(SETTINGS_PATH, JSON.stringify(data, null, 2));
    } catch(e) { console.warn('Settings sync failed:', e); }
  }, 1500);
}

function saveSetting(key, value) {
  IDB.put('settings', key, value);
  saveSettings();
}

// ════════════════════════════════════════
// Init
// ════════════════════════════════════════
async function init() {
  await IDB.open();

  // Load IDB settings for instant display (before Dropbox connects)
  const localThumb = await IDB.get('settings','thumbSize');
  if (localThumb) { App.thumbSize = localThumb; $('#thumb-slider').value = localThumb; document.documentElement.style.setProperty('--thumb-size', localThumb); }
  const localSort = await IDB.get('settings','sortMode');
  if (localSort) { App.sortMode = localSort; $('#sort-select').value = localSort; }
  const localFavs = await IDB.get('settings','favorites');
  if (localFavs) App.favorites = localFavs;
  const localOrders = await IDB.get('settings','customOrders');
  App.customOrders = localOrders || {};
  const localSh = await IDB.get('settings','sidebarHidden');
  if (localSh) $('#sidebar').classList.add('hidden');

  App.storage = new StorageBridge({ basePath: '', storagePrefix: 'dbxfiler', ui: true, uiTarget: '#dbx-ui' });

  App.storage.on('connected', async () => {
    $('#connection-screen').style.display = 'none';
    $('#app').classList.add('active');
    // Load cloud settings (merge with local)
    const s = await loadSettings();
    App.thumbSize = s.thumbSize; $('#thumb-slider').value = s.thumbSize; document.documentElement.style.setProperty('--thumb-size', s.thumbSize);
    App.sortMode = s.sortMode; $('#sort-select').value = s.sortMode;
    App.favorites = s.favorites;
    App.customOrders = s.customOrders || {};
    if (s.sidebarHidden) $('#sidebar').classList.add('hidden'); else $('#sidebar').classList.remove('hidden');
    renderFavorites();
    await navigate(pathFromHash() ?? s.lastPath ?? '', true);
  });
  App.storage.on('disconnected', () => { $('#connection-screen').style.display = ''; $('#app').classList.remove('active'); });
  if (App.storage.isConnected) {
    $('#connection-screen').style.display = 'none'; $('#app').classList.add('active');
    const s = await loadSettings();
    App.thumbSize = s.thumbSize; $('#thumb-slider').value = s.thumbSize; document.documentElement.style.setProperty('--thumb-size', s.thumbSize);
    App.sortMode = s.sortMode; $('#sort-select').value = s.sortMode;
    App.favorites = s.favorites;
    App.customOrders = s.customOrders || {};
    if (s.sidebarHidden) $('#sidebar').classList.add('hidden'); else $('#sidebar').classList.remove('hidden');
    renderFavorites();
    navigate(pathFromHash() ?? s.lastPath ?? '', true);
  }
  setupEvents();
}

// ── History ──
function pathFromHash() { const h = location.hash; if (!h || h === '#') return null; try { return decodeURIComponent(h.slice(1)); } catch(_) { return null; } }
function pushHash(p) { const h = '#' + encodeURIComponent(p); if (location.hash !== h) history.pushState(null, '', h); }
function replaceHash(p) { history.replaceState(null, '', '#' + encodeURIComponent(p)); }

// ── Navigation ──
async function navigate(path, replace) {
  path = (path || '').replace(/^\/+|\/+$/g, '');
  App.currentPath = path; App.selected.clear(); updateSelBadge();
  saveSetting('lastPath', path);
  replace ? replaceHash(path) : pushHash(path);
  $('#btn-up').classList.toggle('disabled', !path);
  renderBreadcrumb(); renderFavorites();
  await loadFolder(path);
}

async function loadFolder(path) {
  const gen = ++App.navGen; const grid = $('#grid'); const ld = $('#loading-overlay');
  grid.innerHTML = ''; ld.classList.add('active');
  try {
    const entries = await App.storage.list(path || '');
    if (gen !== App.navGen) return;
    App.entries = sortEntries(entries);
    App.entries = applyCustomOrder(App.entries);
    App.selected.clear(); updateSelBadge();
    renderGrid(gen);
  } catch(e) { if (gen === App.navGen) grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠</div><div>読み込みエラー</div></div>'; }
  finally { if (gen === App.navGen) ld.classList.remove('active'); }
}

function sortEntries(entries) {
  const folders = entries.filter(e => e['.tag'] === 'folder');
  const files = entries.filter(e => e['.tag'] === 'file');
  const cmp = (a, b) => { switch (App.sortMode) {
    case 'name_asc': return naturalCmp(a.name, b.name);
    case 'name_desc': return naturalCmp(b.name, a.name);
    case 'date_desc': return (b.client_modified||'').localeCompare(a.client_modified||'');
    case 'date_asc': return (a.client_modified||'').localeCompare(b.client_modified||'');
    case 'size_desc': return (b.size||0) - (a.size||0);
    case 'size_asc': return (a.size||0) - (b.size||0);
    default: return 0; }};
  folders.sort((a, b) => naturalCmp(a.name, b.name)); files.sort(cmp);
  return [...folders, ...files];
}

function renderBreadcrumb() {
  const parts = App.currentPath ? App.currentPath.split('/') : [];
  let h = `<span class="bc-item${!parts.length ? ' current' : ''}" data-path="">Dropbox</span>`, acc = '';
  for (let i = 0; i < parts.length; i++) { acc += (acc ? '/' : '') + parts[i]; h += `<span class="bc-sep">›</span><span class="bc-item${i===parts.length-1?' current':''}" data-path="${acc}">${parts[i]}</span>`; }
  const bc = $('#breadcrumb'); bc.innerHTML = h; bc.scrollLeft = bc.scrollWidth;
}

// ── Grid ──
function renderGrid(gen) {
  const grid = $('#grid'); const entries = App.entries;
  if (!entries.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div><div>空のフォルダ</div></div>'; return; }
  grid.innerHTML = entries.map((entry, idx) => {
    const isF = entry['.tag'] === 'folder', e = ext(entry.name), sel = App.selected.has(idx);
    const draggable = !isF ? ' draggable="true"' : '';
    return `<div class="grid-item${sel ? ' selected' : ''}" data-index="${idx}" data-tag="${entry['.tag']}"${draggable}>
      <div class="grid-check" data-check="${idx}">${sel ? '✓' : ''}</div>
      <div class="grid-thumb" id="thumb-${idx}">${isF ? '<span class="folder-icon">📁</span>' : (THUMB_EXT.has(e) ? '<div class="loading-spinner"></div>' : '<span class="file-icon">📄</span>')}</div>
      <div class="grid-name" title="${entry.name}">${entry.name}</div></div>`;
  }).join('');
  setupObserver(gen); loadFolderPreviews(gen);
}

// ── Selection ──
function toggleSelect(idx, multi, range) {
  if (range && App._lastClickIdx !== undefined) {
    const lo = Math.min(App._lastClickIdx, idx), hi = Math.max(App._lastClickIdx, idx);
    for (let i = lo; i <= hi; i++) App.selected.add(i);
  } else if (multi) {
    App.selected.has(idx) ? App.selected.delete(idx) : App.selected.add(idx);
  } else {
    if (App.selected.size === 1 && App.selected.has(idx)) App.selected.clear();
    else { App.selected.clear(); App.selected.add(idx); }
  }
  App._lastClickIdx = idx;
  updateSelectionUI();
}
function selectAll() { App.entries.forEach((_, i) => App.selected.add(i)); updateSelectionUI(); }
function clearSelection() { App.selected.clear(); updateSelectionUI(); }
function updateSelectionUI() {
  document.querySelectorAll('.grid-item').forEach(el => {
    const idx = parseInt(el.dataset.index), sel = App.selected.has(idx);
    el.classList.toggle('selected', sel);
    const chk = el.querySelector('.grid-check');
    if (chk) chk.textContent = sel ? '✓' : '';
  });
  updateSelBadge();
}
function updateSelBadge() {
  const b = $('#sel-badge'), n = App.selected.size;
  b.textContent = n + '件選択'; b.classList.toggle('show', n > 0);
}
function selectedFileEntries() {
  return [...App.selected].sort((a,b) => a - b).map(i => App.entries[i]).filter(e => e && e['.tag'] === 'file');
}

// ── Thumb Observer ──
let observer = null;
function setupObserver(gen) {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(ios => { for (const io of ios) { if (io.isIntersecting) { loadThumb(parseInt(io.target.dataset.index), gen); observer.unobserve(io.target); } } }, { root: $('#main'), rootMargin: '300px' });
  document.querySelectorAll('.grid-item[data-tag="file"]').forEach(el => { const i = parseInt(el.dataset.index); if (App.entries[i] && THUMB_EXT.has(ext(App.entries[i].name))) observer.observe(el); });
}
async function loadThumb(idx, gen) {
  const entry = App.entries[idx]; if (!entry) return;
  const ck = entry.path_lower + ':' + (entry.content_hash || '');
  if (App.thumbCache[ck]) { setThumbImg(idx, gen, App.thumbCache[ck]); return; }
  const cached = await IDB.get('thumbs', ck);
  if (cached) { const u = URL.createObjectURL(new Blob([cached], { type: 'image/jpeg' })); App.thumbCache[ck] = u; setThumbImg(idx, gen, u); return; }
  tqRun(async () => { const blob = await fetchThumbnail(entry.path_display || entry.path_lower); const buf = await blob.arrayBuffer(); const u = URL.createObjectURL(new Blob([buf], { type: 'image/jpeg' })); App.thumbCache[ck] = u; IDB.put('thumbs', ck, buf); setThumbImg(idx, gen, u); }).catch(() => { if (gen === App.navGen) { const el = document.getElementById('thumb-' + idx); if (el) el.innerHTML = '<span class="file-icon">🖼</span>'; } });
}
function setThumbImg(idx, gen, u) { if (gen !== App.navGen) return; const el = document.getElementById('thumb-' + idx); if (el) el.innerHTML = `<img src="${u}" alt="">`; }

// ── Folder Previews ──
async function loadFolderPreviews(gen) {
  for (const [i, e] of App.entries.entries()) {
    if (e['.tag'] !== 'folder' || gen !== App.navGen) continue;
    const cached = await IDB.get('folderPreviews', e.path_lower);
    if (cached && cached.length) { renderFP(i, gen, cached); continue; }
    loadOneFP(e, i, gen);
  }
}
async function loadOneFP(entry, idx, gen) {
  try {
    const ch = await App.storage.list(entryRelPath(entry)); if (gen !== App.navGen) return;
    const imgs = ch.filter(c => c['.tag'] === 'file' && THUMB_EXT.has(ext(c.name))).slice(0, 4);
    if (!imgs.length) return;
    const urls = [];
    for (const img of imgs) { if (gen !== App.navGen) return; try { urls.push(URL.createObjectURL(await tqRun(() => fetchThumbnail(img.path_display || img.path_lower, 'w128h128')))); } catch(_) {} }
    if (urls.length && gen === App.navGen) {
      const bufs = []; for (const u of urls) try { bufs.push(await (await fetch(u)).arrayBuffer()); } catch(_) {}
      if (bufs.length) IDB.put('folderPreviews', entry.path_lower, bufs);
      renderFP(idx, gen, urls);
    }
  } catch(_) {}
}
function renderFP(idx, gen, data) {
  if (gen !== App.navGen) return; const el = document.getElementById('thumb-' + idx); if (!el) return;
  const urls = data.map(u => typeof u === 'string' ? u : URL.createObjectURL(new Blob([u], { type: 'image/jpeg' })));
  let cells = ''; for (let i = 0; i < 4; i++) cells += urls[i] ? `<div class="fp-cell"><img src="${urls[i]}" alt=""></div>` : '<div class="fp-cell"><span class="fp-empty">·</span></div>';
  el.innerHTML = `<div class="folder-preview">${cells}<div class="folder-badge">📁</div></div>`;
}

// ── Favorites ──
function renderFavorites() {
  const l = $('#fav-list');
  if (!App.favorites.length) { l.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:11.5px;text-align:center">お気に入りなし</div>'; return; }
  l.innerHTML = App.favorites.map((f, i) => `<div class="fav-item${App.currentPath===f.path?' active':''}" data-path="${f.path}" data-index="${i}"><span class="fav-icon">📁</span><span class="fav-name" title="${f.path||'ルート'}">${f.name}</span><button class="fav-remove" data-index="${i}" title="削除">✕</button></div>`).join('');
}
function addFavorite(p) { if (App.favorites.some(f => f.path === p)) { toast('追加済み'); return; } App.favorites.push({ path: p, name: p ? baseName(p) : 'ルート' }); saveSetting('favorites', App.favorites); renderFavorites(); toast('お気に入りに追加'); }
function removeFavorite(i) { App.favorites.splice(i, 1); saveSetting('favorites', App.favorites); renderFavorites(); }

// ── Context Menu ──
let ctxTarget = null, ctxIsMulti = false;
function showCtx(x, y, entry, multi) {
  ctxTarget = entry; ctxIsMulti = multi;
  const m = $('#ctx-menu'), isF = entry['.tag'] === 'folder', e = ext(entry.name);
  let h = '';
  if (multi) {
    const count = App.selected.size;
    h += `<div class="ctx-item" style="color:var(--text-muted);pointer-events:none;font-size:11.5px">${count}件選択中</div><div class="ctx-sep"></div>`;
    h += '<div class="ctx-item" data-action="batch-rename"><span class="ctx-icon">🔢</span>連番リネーム</div>';
    h += '<div class="ctx-item danger" data-action="delete-multi"><span class="ctx-icon">🗑</span>まとめて削除</div>';
  } else {
    if (isF) { h += '<div class="ctx-item" data-action="open"><span class="ctx-icon">📂</span>開く</div><div class="ctx-item" data-action="fav"><span class="ctx-icon">⭐</span>お気に入りに追加</div><div class="ctx-sep"></div>'; }
    else if (IMG_EXT.has(e)) { h += '<div class="ctx-item" data-action="view"><span class="ctx-icon">🖼</span>画像を開く</div><div class="ctx-sep"></div>'; }
    h += '<div class="ctx-item" data-action="rename"><span class="ctx-icon">✏</span>名前の変更</div>';
    h += '<div class="ctx-item danger" data-action="delete"><span class="ctx-icon">🗑</span>削除</div>';
  }
  m.innerHTML = h; m.style.left = Math.min(x, innerWidth - 200) + 'px'; m.style.top = Math.min(y, innerHeight - 200) + 'px'; m.classList.add('show');
}
function hideCtx() { $('#ctx-menu').classList.remove('show'); ctxTarget = null; ctxIsMulti = false; }

async function doCtx(action) {
  const entry = ctxTarget; hideCtx();
  if (action === 'open') navigate(entryRelPath(entry));
  else if (action === 'view') openViewer(entry);
  else if (action === 'fav') addFavorite(entryRelPath(entry));
  else if (action === 'rename') showRenameModal(entry);
  else if (action === 'delete') await deleteEntry(entry);
  else if (action === 'batch-rename') openBatchRename();
  else if (action === 'delete-multi') await deleteMulti();
}

// ── Rename (single) ──
let renameTarget = null;
function showRenameModal(entry) { renameTarget = entry; const inp = $('#rename-input'); inp.value = entry['.tag'] === 'folder' ? entry.name : entry.name.replace(/\.[^.]+$/, ''); $('#modal-rename').classList.add('show'); setTimeout(() => { inp.focus(); inp.select(); }, 50); }
async function execRename() {
  if (!renameTarget) return; const entry = renameTarget, raw = $('#rename-input').value.trim(); if (!raw) return;
  const e = ext(entry.name), fin = (entry['.tag'] === 'file' && e) ? raw + '.' + e : raw;
  if (fin === entry.name) { $('#modal-rename').classList.remove('show'); return; }
  const rel = entryRelPath(entry), par = parentPath(rel), nr = par ? par + '/' + fin : fin;
  try { await App.storage.move(rel, nr); toast('名前を変更しました'); $('#modal-rename').classList.remove('show'); loadFolder(App.currentPath); } catch(e) { toast('エラー: ' + e.message); }
}

// ── Delete ──
async function deleteEntry(entry) { if (!confirm(`「${entry.name}」を削除しますか？`)) return; try { await App.storage.delete(entryRelPath(entry)); toast('削除しました'); loadFolder(App.currentPath); } catch(e) { toast('削除エラー: ' + e.message); } }
async function deleteMulti() {
  const sel = [...App.selected].map(i => App.entries[i]).filter(Boolean);
  if (!sel.length || !confirm(`${sel.length}件を削除しますか？`)) return;
  let ok = 0, fail = 0;
  for (const e of sel) { try { await App.storage.delete(entryRelPath(e)); ok++; } catch(_) { fail++; } }
  toast(fail ? `${ok}件削除（${fail}件エラー）` : `${ok}件削除しました`);
  loadFolder(App.currentPath);
}

// ── Batch Rename ──
function openBatchRename() {
  const files = selectedFileEntries(); if (!files.length) { toast('ファイルを選択してください'); return; }
  $('#batch-count').textContent = files.length;
  $('#preset-select').value = 'nnn'; $('#prefix-input').value = ''; $('#custom-input').value = '';
  $('#prefix-row').style.display = 'none'; $('#custom-row').style.display = 'none';
  updateRenamePreview(); $('#modal-batch-rename').classList.add('show');
}
function updateRenamePreview() {
  const files = selectedFileEntries(), preset = $('#preset-select').value, prefix = $('#prefix-input').value.trim(), custom = $('#custom-input').value.trim();
  const names = files.map((f, i) => { const e = ext(f.name), n = i + 1; switch(preset) {
    case 'nnn': return pad(n,3)+(e?'.'+e:''); case 'nn': return pad(n,2)+(e?'.'+e:'');
    case 'prefix_nnn': return (prefix||'file')+'_'+pad(n,3)+(e?'.'+e:'');
    case 'custom': return applyCust(custom,n,e,f.name); default: return f.name; }});
  $('#rename-preview').innerHTML = files.map((f,i) => `<div class="rp-row"><span class="rp-old">${f.name}</span><span class="rp-arrow">→</span><span class="rp-new">${names[i]}</span></div>`).join('');
}
function pad(n, d) { return String(n).padStart(d, '0'); }
function applyCust(p, n, e, orig) { return (p||orig).replace('{NNN}',pad(n,3)).replace('{NN}',pad(n,2)).replace('{N}',n).replace('{ext}',e).replace('{name}',orig.replace(/\.[^.]+$/,'')); }

async function executeBatchRename() {
  const files = selectedFileEntries(), preset = $('#preset-select').value, prefix = $('#prefix-input').value.trim(), custom = $('#custom-input').value.trim();
  const names = files.map((f,i) => { const e = ext(f.name), n = i+1; switch(preset) {
    case 'nnn': return pad(n,3)+(e?'.'+e:''); case 'nn': return pad(n,2)+(e?'.'+e:'');
    case 'prefix_nnn': return (prefix||'file')+'_'+pad(n,3)+(e?'.'+e:'');
    case 'custom': return applyCust(custom,n,e,f.name); default: return f.name; }});
  const renames = files.map((f,i) => ({ entry: f, newName: names[i] })).filter(r => r.entry.name !== r.newName);
  if (!renames.length) { toast('変更なし'); return; }
  if (!confirm(`${renames.length}件リネームしますか？`)) return;
  $('#modal-batch-rename').classList.remove('show'); toast('リネーム中...');
  const undo = []; let fail = 0;
  // Pass 1: to temp
  for (let i = 0; i < renames.length; i++) {
    const r = renames[i], rel = entryRelPath(r.entry), par = parentPath(rel);
    const tmp = (par ? par + '/' : '') + '__tmp_' + i + '_' + r.newName;
    try { await App.storage.move(rel, tmp); r._tmp = tmp; undo.push({ from: null, origRel: rel }); } catch(_) { fail++; r._tmp = null; }
  }
  // Pass 2: to final
  for (let i = 0; i < renames.length; i++) {
    if (!renames[i]._tmp) continue;
    const par = parentPath(renames[i]._tmp), fin = (par ? par + '/' : '') + renames[i].newName;
    try { await App.storage.move(renames[i]._tmp, fin); undo[i].from = fin; } catch(_) { fail++; }
  }
  App.undoHistory = { entries: undo.filter(u => u.from) }; updateUndoBtn();
  toast(fail ? `完了（${fail}件エラー）` : `${renames.length}件リネーム完了`);
  loadFolder(App.currentPath);
}
function updateUndoBtn() { $('#btn-undo').style.display = (App.undoHistory?.entries?.length) ? '' : 'none'; }
async function undoRename() {
  const ents = App.undoHistory?.entries; if (!ents?.length || !confirm(`${ents.length}件のリネームを元に戻しますか？`)) return;
  toast('元に戻しています...'); let fail = 0;
  for (let i = 0; i < ents.length; i++) { const par = parentPath(ents[i].from), tmp = (par?par+'/':'') + '__undo_'+i+'_'+baseName(ents[i].origRel); try { await App.storage.move(ents[i].from, tmp); ents[i]._tmp = tmp; } catch(_) { fail++; ents[i]._tmp = null; } }
  for (let i = 0; i < ents.length; i++) { if (!ents[i]._tmp) continue; try { await App.storage.move(ents[i]._tmp, ents[i].origRel); } catch(_) { fail++; } }
  App.undoHistory = null; updateUndoBtn();
  toast(fail ? `元に戻す完了（${fail}件エラー）` : '元に戻しました'); loadFolder(App.currentPath);
}

// ── D&D Reorder (always-on for files) ──
let dragSrcIdx = null;
function initDragReorder() {
  const grid = $('#grid');
  grid.addEventListener('dragstart', e => {
    const item = e.target.closest('.grid-item[data-tag="file"]'); if (!item) { e.preventDefault(); return; }
    dragSrcIdx = parseInt(item.dataset.index);
    // If dragging a selected item, drag all selected; otherwise just this one
    if (!App.selected.has(dragSrcIdx)) { App.selected.clear(); App.selected.add(dragSrcIdx); updateSelectionUI(); }
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', '');
  });
  grid.addEventListener('dragend', e => { document.querySelectorAll('.dragging,.drag-over-before,.drag-over-after').forEach(el => el.classList.remove('dragging','drag-over-before','drag-over-after')); dragSrcIdx = null; });
  grid.addEventListener('dragover', e => {
    if (dragSrcIdx === null) return; e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.grid-item[data-tag="file"]'); if (!item) return;
    document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => el.classList.remove('drag-over-before','drag-over-after'));
    const rect = item.getBoundingClientRect();
    (e.clientX < rect.left + rect.width/2) ? item.classList.add('drag-over-before') : item.classList.add('drag-over-after');
  });
  grid.addEventListener('drop', e => {
    e.preventDefault(); if (dragSrcIdx === null) return;
    const item = e.target.closest('.grid-item[data-tag="file"]'); if (!item) return;
    const dropIdx = parseInt(item.dataset.index);
    const rect = item.getBoundingClientRect(), before = e.clientX < rect.left + rect.width/2;
    reorderEntries(dropIdx, before);
    document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => el.classList.remove('drag-over-before','drag-over-after'));
  });

  // Touch D&D
  let tSrc = null, tClone = null, tLP = null;
  grid.addEventListener('touchstart', e => {
    const item = e.target.closest('.grid-item[data-tag="file"]'); if (!item) return;
    tLP = setTimeout(() => {
      tSrc = parseInt(item.dataset.index);
      if (!App.selected.has(tSrc)) { App.selected.clear(); App.selected.add(tSrc); updateSelectionUI(); }
      App._touchDragging = true;
      item.classList.add('dragging');
      tClone = item.cloneNode(true); tClone.className = 'touch-drag-clone';
      tClone.style.width = item.offsetWidth + 'px'; tClone.style.height = item.offsetHeight + 'px';
      document.body.appendChild(tClone); posC(e.touches[0]);
    }, 400);
  }, { passive: true });
  grid.addEventListener('touchmove', e => {
    if (tClone) { e.preventDefault(); posC(e.touches[0]);
      document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => el.classList.remove('drag-over-before','drag-over-after'));
      const under = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)?.closest('.grid-item[data-tag="file"]');
      if (under) { const r = under.getBoundingClientRect(); (e.touches[0].clientX < r.left+r.width/2) ? under.classList.add('drag-over-before') : under.classList.add('drag-over-after'); }
    } else clearTimeout(tLP);
  }, { passive: false });
  grid.addEventListener('touchend', e => {
    clearTimeout(tLP);
    if (tClone && tSrc !== null) {
      const under = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY)?.closest('.grid-item[data-tag="file"]');
      if (under) { const di = parseInt(under.dataset.index), r = under.getBoundingClientRect(); if (di !== tSrc) reorderEntries(di, e.changedTouches[0].clientX < r.left + r.width/2); }
      tClone.remove(); tClone = null;
      document.querySelectorAll('.dragging,.drag-over-before,.drag-over-after').forEach(el => el.classList.remove('dragging','drag-over-before','drag-over-after'));
      tSrc = null; App._touchDragging = false;
    }
  });
  function posC(t) { if (tClone) { tClone.style.left = (t.clientX-40)+'px'; tClone.style.top = (t.clientY-40)+'px'; } }
}

function reorderEntries(dropIdx, before) {
  const selIndices = [...App.selected].filter(i => App.entries[i]?.['.tag'] === 'file').sort((a,b) => a - b);
  if (!selIndices.length) return;
  // If dropping onto a selected item, do nothing
  if (selIndices.includes(dropIdx)) return;
  const dragged = selIndices.map(i => App.entries[i]);
  const dropEntry = App.entries[dropIdx];
  const remaining = App.entries.filter((_, i) => !selIndices.includes(i));
  let insertAt = remaining.indexOf(dropEntry);
  if (insertAt === -1) insertAt = remaining.length;
  if (!before) insertAt++;
  remaining.splice(insertAt, 0, ...dragged);
  App.entries = remaining;
  App.selected.clear();
  dragged.forEach(d => { const ni = App.entries.indexOf(d); if (ni >= 0) App.selected.add(ni); });
  saveCustomOrder();
  renderGrid(App.navGen);
}

// ── Custom order persistence ──
function customOrderKey() { return App.currentPath || '/'; }
function saveCustomOrder() {
  const names = App.entries.map(e => e.name);
  if (!App.customOrders) App.customOrders = {};
  App.customOrders[customOrderKey()] = names;
  saveSetting('customOrders', App.customOrders);
}
function applyCustomOrder(entries) {
  const saved = App.customOrders?.[customOrderKey()];
  if (!saved || !saved.length) return entries;
  const byName = new Map();
  entries.forEach(e => byName.set(e.name, e));
  const ordered = [], used = new Set();
  for (const name of saved) {
    if (byName.has(name) && !used.has(name)) { ordered.push(byName.get(name)); used.add(name); }
  }
  for (const e of entries) { if (!used.has(e.name)) ordered.push(e); }
  return ordered;
}

// ── Image Viewer ──
function openViewer(entry) {
  App.viewerImages = App.entries.filter(e => e['.tag'] === 'file' && IMG_EXT.has(ext(e.name)));
  const idx = App.viewerImages.indexOf(entry); if (idx === -1) return;
  App.viewerIndex = idx; App.viewerVisible = true;
  const img = $('#viewer-img'); img.removeAttribute('src'); img.classList.add('loading');
  $('#viewer').classList.add('active'); showViewerBar(); loadViewerPage(idx); updateVSlider();
  history.pushState({ viewer: true }, '', location.hash);
}
function closeViewer() { if (!App.viewerVisible) return; App.viewerVisible = false; $('#viewer').classList.remove('active'); $('#viewer-img').removeAttribute('src'); for (const u of Object.values(App.prefetchCache)) URL.revokeObjectURL(u); App.prefetchCache = {}; }
let vGen = 0;
async function loadViewerPage(idx) {
  if (idx < 0 || idx >= App.viewerImages.length) return;
  App.viewerIndex = idx; const entry = App.viewerImages[idx], rel = entryRelPath(entry), img = $('#viewer-img'), g = ++vGen;
  $('#viewer-title').textContent = entry.name; updateVSlider(); img.removeAttribute('src'); img.classList.add('loading');
  try { let u = App.prefetchCache[rel]; if (!u) { const buf = await App.storage.loadBinary(rel); if (g !== vGen) return; const e = ext(entry.name), mime = e === 'svg' ? 'image/svg+xml' : 'image/'+(e==='jpg'?'jpeg':e); u = URL.createObjectURL(new Blob([buf], { type: mime })); }
    if (g !== vGen) return; img.src = u; img.onload = () => { if (g === vGen) img.classList.remove('loading'); };
  } catch(_) { if (g === vGen) img.classList.remove('loading'); }
  prefetchV(idx);
}
async function prefetchV(cur) { for (const off of [1,-1,2,-2,3,-3]) { const i = cur+off; if (i<0||i>=App.viewerImages.length) continue; const rel = entryRelPath(App.viewerImages[i]); if (App.prefetchCache[rel]) continue; try { const buf = await App.storage.loadBinary(rel); const e = ext(App.viewerImages[i].name), mime = e==='svg'?'image/svg+xml':'image/'+(e==='jpg'?'jpeg':e); App.prefetchCache[rel] = URL.createObjectURL(new Blob([buf], { type: mime })); } catch(_) {} } }
function vPrev() { if (App.viewerIndex > 0) loadViewerPage(App.viewerIndex - 1); }
function vNext() { if (App.viewerIndex < App.viewerImages.length - 1) loadViewerPage(App.viewerIndex + 1); }
function updateVSlider() { const s = $('#viewer-slider'); s.max = App.viewerImages.length-1; s.value = App.viewerIndex; $('#viewer-page-label').textContent = `${App.viewerIndex+1} / ${App.viewerImages.length}`; }
function showViewerBar() { $('#viewer-topbar').classList.add('visible'); $('#viewer-bottombar').classList.add('visible'); clearTimeout(App.toolbarTimer); App.toolbarTimer = setTimeout(() => { if (App.viewerVisible) { $('#viewer-topbar').classList.remove('visible'); $('#viewer-bottombar').classList.remove('visible'); } }, 3000); }

// ════════════════════════════════════════
// Events
// ════════════════════════════════════════
function setupEvents() {
  $('#btn-back').onclick = () => history.back();
  $('#btn-forward').onclick = () => history.forward();
  $('#btn-up').onclick = () => { if (App.currentPath) navigate(parentPath(App.currentPath)); };
  $('#btn-refresh').onclick = () => loadFolder(App.currentPath);
  $('#btn-disconnect').onclick = () => App.storage.disconnect();
  $('#btn-sidebar').onclick = () => { const sb = $('#sidebar'), mob = innerWidth <= 700; if (mob) sb.classList.toggle('mobile-open'); else { sb.classList.toggle('hidden'); saveSetting('sidebarHidden', sb.classList.contains('hidden')); } };
  $('#btn-select-all').onclick = selectAll;
  $('#btn-undo').onclick = undoRename;

  $('#breadcrumb').addEventListener('click', e => { const item = e.target.closest('.bc-item'); if (item && !item.classList.contains('current')) navigate(item.dataset.path); });
  $('#sort-select').onchange = e => { App.sortMode = e.target.value; saveSetting('sortMode', App.sortMode); if (App.customOrders) { delete App.customOrders[customOrderKey()]; saveSetting('customOrders', App.customOrders); } App.entries = sortEntries(App.entries); renderGrid(App.navGen); };
  $('#thumb-slider').oninput = e => { App.thumbSize = parseInt(e.target.value); document.documentElement.style.setProperty('--thumb-size', App.thumbSize); saveSetting('thumbSize', App.thumbSize); };
  $('#btn-add-fav').onclick = () => addFavorite(App.currentPath);
  $('#fav-list').addEventListener('click', e => { const rm = e.target.closest('.fav-remove'); if (rm) { removeFavorite(parseInt(rm.dataset.index)); return; } const item = e.target.closest('.fav-item'); if (item) { navigate(item.dataset.path); $('#sidebar').classList.remove('mobile-open'); } });

  // Grid click — desktop: dblclick opens, click selects. Mobile: tap opens, checkbox selects.
  const isTouchDevice = () => 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  let lastTapT = 0, lastTapEl = null;
  $('#grid').addEventListener('click', e => {
    if (lassoState?.prevented) return;
    
    const chk = e.target.closest('.grid-check');
    if (chk) { e.stopPropagation(); toggleSelect(parseInt(chk.dataset.check), true, false); return; }

    const item = e.target.closest('.grid-item'); if (!item) { if (!lassoState?.prevented) clearSelection(); return; }
    const idx = parseInt(item.dataset.index);

    if (isTouchDevice()) {
      // Mobile: single tap opens folder/image
      handleOpen(item);
    } else {
      // Desktop: double-click opens, single click selects
      const now = Date.now();
      if (now - lastTapT < 350 && lastTapEl === item) { handleOpen(item); lastTapT = 0; return; }
      lastTapT = now; lastTapEl = item;
      toggleSelect(idx, e.ctrlKey || e.metaKey, e.shiftKey);
    }
  });

  // Rubber-band (lasso) selection — starts anywhere in main, threshold 5px
  let lassoState = null; // { startX, startY, active, prevented }
  $('#main').addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    // Don't lasso from checkbox or during viewer
    if (e.target.closest('.grid-check') || App.viewerVisible) return;
    lassoState = { startX: e.clientX, startY: e.clientY, active: false, prevented: false, ctrl: e.ctrlKey || e.metaKey, shift: e.shiftKey };
  });
  document.addEventListener('mousemove', e => {
    if (!lassoState) return;
    const dx = e.clientX - lassoState.startX, dy = e.clientY - lassoState.startY;
    // Threshold: start lasso after 5px movement
    if (!lassoState.active) {
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      lassoState.active = true;
      if (!lassoState.ctrl && !lassoState.shift) { App.selected.clear(); updateSelectionUI(); }
      $('#lasso').style.display = 'block';
    }
    const el = $('#lasso');
    const x1 = Math.min(lassoState.startX, e.clientX), y1 = Math.min(lassoState.startY, e.clientY);
    const x2 = Math.max(lassoState.startX, e.clientX), y2 = Math.max(lassoState.startY, e.clientY);
    el.style.left = x1 + 'px'; el.style.top = y1 + 'px';
    el.style.width = (x2 - x1) + 'px'; el.style.height = (y2 - y1) + 'px';
    // Hit test grid items
    document.querySelectorAll('.grid-item').forEach(item => {
      const r = item.getBoundingClientRect();
      const idx = parseInt(item.dataset.index);
      const hit = !(r.right < x1 || r.left > x2 || r.bottom < y1 || r.top > y2);
      if (hit) App.selected.add(idx);
      else if (!lassoState.ctrl) App.selected.delete(idx);
    });
    updateSelectionUI();
  });
  document.addEventListener('mouseup', () => {
    if (lassoState?.active) {
      // Suppress the click that would fire right after
      lassoState.prevented = true;
      setTimeout(() => { lassoState = null; }, 10);
    } else {
      lassoState = null;
    }
    $('#lasso').style.display = 'none';
  });
  // Suppress HTML5 dragstart while lasso is active
  $('#grid').addEventListener('dragstart', e => {
    if (lassoState?.active) { e.preventDefault(); return; }
  }, true);
  $('#grid').addEventListener('dblclick', e => { if (e.target.closest('.grid-check') || lassoState?.prevented) return; const item = e.target.closest('.grid-item'); if (item) handleOpen(item); });

  // Context menu
  $('#grid').addEventListener('contextmenu', e => {
    const item = e.target.closest('.grid-item'); if (!item) return; e.preventDefault();
    const idx = parseInt(item.dataset.index), entry = App.entries[idx]; if (!entry) return;
    // If right-clicking a selected item with multi-selection, show multi menu
    if (App.selected.has(idx) && App.selected.size > 1) { showCtx(e.clientX, e.clientY, entry, true); }
    else { if (!App.selected.has(idx)) { App.selected.clear(); App.selected.add(idx); updateSelectionUI(); } showCtx(e.clientX, e.clientY, entry, false); }
  });
  // Long press (mobile)
  let lpT = null;
  $('#grid').addEventListener('touchstart', e => {
    const item = e.target.closest('.grid-item'); if (!item) return;
    lpT = setTimeout(() => {
      const idx = parseInt(item.dataset.index), entry = App.entries[idx]; if (!entry) return;
      if (App.selected.has(idx) && App.selected.size > 1) showCtx(e.touches[0].clientX, e.touches[0].clientY, entry, true);
      else { if (!App.selected.has(idx)) { App.selected.clear(); App.selected.add(idx); updateSelectionUI(); } showCtx(e.touches[0].clientX, e.touches[0].clientY, entry, false); }
    }, 500);
  }, { passive: true });
  $('#grid').addEventListener('touchend', () => clearTimeout(lpT));
  $('#grid').addEventListener('touchmove', () => clearTimeout(lpT));

  document.addEventListener('click', e => { if (!e.target.closest('#ctx-menu')) hideCtx(); });
  $('#ctx-menu').addEventListener('click', e => { const item = e.target.closest('.ctx-item'); if (item) doCtx(item.dataset.action); });

  // Rename modal
  $('#rename-ok').onclick = execRename; $('#rename-cancel').onclick = () => $('#modal-rename').classList.remove('show');
  $('#rename-input').addEventListener('keydown', e => { if (e.key==='Enter') execRename(); if (e.key==='Escape') $('#modal-rename').classList.remove('show'); });

  // Batch rename modal
  $('#batch-cancel').onclick = () => $('#modal-batch-rename').classList.remove('show');
  $('#batch-exec').onclick = executeBatchRename;
  $('#preset-select').onchange = () => { const v = $('#preset-select').value; $('#prefix-row').style.display = v==='prefix_nnn'?'flex':'none'; $('#custom-row').style.display = v==='custom'?'flex':'none'; updateRenamePreview(); };
  $('#prefix-input').oninput = updateRenamePreview;
  $('#custom-input').oninput = updateRenamePreview;

  // Viewer
  $('#viewer-close').onclick = () => { closeViewer(); history.back(); };
  $('#tap-left').onclick = vPrev; $('#tap-right').onclick = vNext; $('#tap-center').onclick = showViewerBar;
  $('#viewer-slider').oninput = e => loadViewerPage(parseInt(e.target.value));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.closest('input')) return;
    if (App.viewerVisible) { if (e.key==='Escape') { closeViewer(); history.back(); } else if (e.key==='ArrowLeft') vPrev(); else if (e.key==='ArrowRight') vNext(); return; }
    if (e.key==='Backspace') { e.preventDefault(); if (App.currentPath) navigate(parentPath(App.currentPath)); }
    if (e.key==='a' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); selectAll(); }
    if (e.key==='Escape') clearSelection();
    if (e.key==='z' && (e.ctrlKey||e.metaKey) && App.undoHistory) { e.preventDefault(); undoRename(); }
  });

  // Viewer swipe / mouse / wheel
  let sx = 0;
  $('#viewer-img-wrap').addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
  $('#viewer-img-wrap').addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - sx; if (Math.abs(dx)>50) dx > 0 ? vPrev() : vNext(); });
  $('#viewer').addEventListener('mousemove', () => { if (App.viewerVisible) showViewerBar(); });
  let wCD = false;
  $('#viewer').addEventListener('wheel', e => { if (!App.viewerVisible||wCD) return; e.preventDefault(); wCD=true; setTimeout(()=>wCD=false,200); e.deltaY>0 ? vNext() : vPrev(); }, { passive: false });

  // Popstate
  window.addEventListener('popstate', () => { if (App.viewerVisible) { closeViewer(); return; } const p = pathFromHash() ?? ''; if (p !== App.currentPath) { App.currentPath = p; saveSetting('lastPath',p); $('#btn-up').classList.toggle('disabled',!p); renderBreadcrumb(); renderFavorites(); loadFolder(p); } });

  // D&D (one-time)
  initDragReorder();
}

function handleOpen(el) {
  const entry = App.entries[parseInt(el.dataset.index)]; if (!entry) return;
  if (entry['.tag'] === 'folder') navigate(entryRelPath(entry));
  else if (IMG_EXT.has(ext(entry.name))) openViewer(entry);
}

document.addEventListener('DOMContentLoaded', init);
</script>
