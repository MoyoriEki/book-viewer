// FOLDER BROWSER
// ============================================================
async function openFolderBrowser(bookId) {
  const meta = App.metadata.books[bookId] || {};
  $('#folder-modal-title').textContent = meta.title || bookId;
  $('#folder-modal-path').textContent = 'books/' + bookId;
  $('#folder-tree').innerHTML = '<div class="shelf-loading"><div class="spinner"></div></div>';
  showModal('modal-folder');

  // Delete entire book folder button
  $('#folder-modal-delete').onclick = async () => {
    hideModal('modal-folder');
    await deleteBook(bookId);
  };

  const tree = await buildFolderTree('books/' + bookId, 0, bookId);
  $('#folder-tree').innerHTML = tree.length > 0 ? '' : '<div style="color:var(--text-muted);font-size:13px;padding:12px 0;">空のフォルダ</div>';
  for (const el of tree) {
    $('#folder-tree').appendChild(el);
  }
}

async function buildFolderTree(folderPath, depth, bookId) {
  const bookRoot = 'books/' + bookId;
  const meta = App.metadata.books[bookId] || {};
  if (!meta.hiddenPaths) meta.hiddenPaths = [];
  const elements = [];
  let entries;
  try { entries = await App.storage.list(folderPath); } catch(e) { return elements; }

  // Sort: folders first, then files, both alphabetically
  const folders = entries.filter(e => e['.tag'] === 'folder').sort((a,b) => a.name.localeCompare(b.name));
  const files = entries.filter(e => e['.tag'] === 'file').sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  for (const folder of folders) {
    const path = folderPath + '/' + folder.name;
    const rel = path.slice(bookRoot.length + 1);
    const isHidden = meta.hiddenPaths.includes(rel);
    const row = document.createElement('div');
    row.className = 'folder-entry' + (isHidden ? ' hidden-entry' : '');
    row.innerHTML = `
      ${'<span class="folder-entry-indent"></span>'.repeat(depth)}
      <span class="folder-entry-icon">📁</span>
      <span class="folder-entry-name is-folder">${folder.name}</span>
      <button class="folder-entry-hide">${isHidden ? '表示' : '非表示'}</button>
      <button class="folder-entry-del" title="削除">✕</button>
    `;
    row.querySelector('.folder-entry-hide').onclick = () => {
      toggleHidden(bookId, rel);
      openFolderBrowser(bookId);
    };
    row.querySelector('.folder-entry-del').onclick = async () => {
      if (!confirm(`「${folder.name}」フォルダを削除しますか？`)) return;
      try {
        await App.storage.delete(path);
        toast(`「${folder.name}」を削除`);
        openFolderBrowser(bookId);
      } catch(e) { toast('削除に失敗'); }
    };
    elements.push(row);

    // Recurse
    const children = await buildFolderTree(path, depth + 1, bookId);
    for (const child of children) elements.push(child);
  }

  for (const file of files) {
    const path = folderPath + '/' + file.name;
    const rel = path.slice(bookRoot.length + 1);
    const isHidden = meta.hiddenPaths.some(h => rel === h || rel.startsWith(h + '/'));
    const size = file.size ? formatSize(file.size) : '';
    const row = document.createElement('div');
    row.className = 'folder-entry' + (isHidden ? ' hidden-entry' : '');
    row.innerHTML = `
      ${'<span class="folder-entry-indent"></span>'.repeat(depth)}
      <span class="folder-entry-icon">${IMG_RE.test(file.name) ? '🖼' : '📄'}</span>
      <span class="folder-entry-name">${file.name}</span>
      <span class="folder-entry-size">${size}</span>
      <button class="folder-entry-del" title="削除">✕</button>
    `;
    row.querySelector('.folder-entry-del').onclick = async () => {
      if (!confirm(`「${file.name}」を削除しますか？`)) return;
      try {
        await App.storage.delete(path);
        toast(`「${file.name}」を削除`);
        row.remove();
      } catch(e) { toast('削除に失敗'); }
    };
    elements.push(row);
  }

  return elements;
}

function toggleHidden(bookId, relPath) {
  const meta = App.metadata.books[bookId];
  if (!meta) return;
  if (!meta.hiddenPaths) meta.hiddenPaths = [];
  const idx = meta.hiddenPaths.indexOf(relPath);
  if (idx >= 0) {
    meta.hiddenPaths.splice(idx, 1);
    toast('表示に戻しました');
  } else {
    meta.hiddenPaths.push(relPath);
    toast('非表示にしました');
  }
  debouncedSave();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ============================================================
// READER
// ============================================================
async function openReader(bookId) {
  App.currentBook = bookId;
  App.pageCache = {};
  App.toolbarVisible = false;
  App.bmListMode = null;
  App.bmListItems = [];
  $('#reader-toolbar').classList.remove('visible');
  $('#reader-topbar').classList.remove('visible');
  closeBmPanel();

  // Restore buttons hidden in bmList mode
  $('#reader-bookmark-btn').style.display = '';
  $('#reader-binding-btn').style.display = '';
  $('#reader-bm-list-btn').style.display = '';

  const meta = App.metadata.books[bookId] || {};
  $('#reader-title').textContent = meta.title || bookId;
  updateBindingBtn();

  showScreen('reader');
  history.pushState({ screen: 'reader', bookId: bookId }, '', '#read/' + encodeURIComponent(bookId));
  $('#reader-loading').style.display = 'flex';
  $('#reader-img').src = '';

  // Load page list
  try {
    const images = await listImagesRecursive('books/' + bookId, meta.hiddenPaths);

    App.totalPages = images.length;
    App.pagePaths = images.map(e => e.path);

    // Update metadata
    if (App.metadata.books[bookId]) {
      App.metadata.books[bookId].totalPages = images.length;
    }

    // Start from last read page
    const startPage = Math.min(meta.lastReadPage || 0, Math.max(0, images.length - 1));
    App.currentPage = startPage;

    // Setup slider
    const slider = $('#reader-slider');
    slider.min = 0;
    slider.max = Math.max(0, images.length - 1);
    slider.value = startPage;

    // Load current page
    await showPage(startPage);

    // Prefetch neighbors
    prefetch(startPage);

    // Init bookmark UI
    updateBookmarkUI();
  } catch (e) {
    console.error('Failed to open book:', e);
    toast('書籍を開けませんでした');
    closeReader();
  }
}

async function showPage(pageNum) {
  if (pageNum < 0 || pageNum >= App.totalPages) return;

  App.currentPage = pageNum;
  updatePageLabel();

  const bookId = App.currentBook;
  const pagePath = App.pagePaths[pageNum];

  // Check cache
  if (App.pageCache[pageNum]) {
    $('#reader-img').src = App.pageCache[pageNum];
    $('#reader-loading').style.display = 'none';
    saveProgress();
    updateBookmarkUI();
    return;
  }

  // Show loading
  $('#reader-loading').style.display = 'flex';

  try {
    const buf = await App.storage.loadBinary(pagePath);
    const ext = pagePath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    const url = URL.createObjectURL(blob);
    App.pageCache[pageNum] = url;

    // Only update if still on this page
    if (App.currentPage === pageNum) {
      $('#reader-img').src = url;
      $('#reader-loading').style.display = 'none';
    }
  } catch (e) {
    console.error('Failed to load page:', e);
    $('#reader-loading').style.display = 'none';
  }

  saveProgress();
  updateBookmarkUI();
}

function prefetch(centerPage) {
  const range = 2;
  for (let i = 1; i <= range; i++) {
    prefetchPage(centerPage + i);
    prefetchPage(centerPage - i);
  }
}

async function prefetchPage(pageNum) {
  if (pageNum < 0 || pageNum >= App.totalPages) return;
  if (App.pageCache[pageNum]) return;

  const pagePath = App.pagePaths[pageNum];
  try {
    const buf = await App.storage.loadBinary(pagePath);
    const ext = pagePath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    App.pageCache[pageNum] = URL.createObjectURL(blob);
  } catch (e) { /* silent */ }
}

function saveProgress() {
  if (!App.currentBook || !App.metadata.books[App.currentBook]) return;
  App.metadata.books[App.currentBook].lastReadPage = App.currentPage;
  App.metadata.books[App.currentBook].lastReadTime = new Date().toISOString();
  debouncedSave();
}

function updatePageLabel() {
  const label = `${App.currentPage + 1} / ${App.totalPages}`;
  $('#reader-page-label').textContent = label;
  $('#reader-slider').value = App.currentPage;
}

function getBinding() {
  const meta = App.metadata.books[App.currentBook];
  return (meta && meta.bindingDirection) || 'rtl';
}

function updateBindingBtn() {
  const rtl = getBinding() === 'rtl';
  $('#reader-binding-btn').textContent = rtl ? '右綴じ' : '左綴じ';
  // Flip slider direction
  const slider = $('#reader-slider');
  slider.style.direction = rtl ? 'rtl' : 'ltr';
  // Re-render bookmark dots (positions depend on direction)
  renderBmDots();
}

function toggleBinding() {
  const meta = App.metadata.books[App.currentBook];
  if (!meta) return;
  meta.bindingDirection = meta.bindingDirection === 'rtl' ? 'ltr' : 'rtl';
  updateBindingBtn();
  debouncedSave();
}

function goNext() {
  if (App.currentPage < App.totalPages - 1) {
    if (App.bmListMode) {
      showBmListPage(App.currentPage + 1);
      bmListPrefetch(App.currentPage + 1);
    } else {
      showPage(App.currentPage + 1);
      prefetch(App.currentPage + 1);
    }
  }
}

function goPrev() {
  if (App.currentPage > 0) {
    if (App.bmListMode) {
      showBmListPage(App.currentPage - 1);
      bmListPrefetch(App.currentPage - 1);
    } else {
      showPage(App.currentPage - 1);
      prefetch(App.currentPage - 1);
    }
  }
}

function tapNav(side) {
  const binding = App.bmListMode ? 'ltr' : getBinding();
  if (binding === 'rtl') {
    if (side === 'right') goPrev();
    else goNext();
  } else {
    if (side === 'right') goNext();
    else goPrev();
  }
}

function toggleToolbar() {
  App.toolbarVisible = !App.toolbarVisible;
  $('#reader-toolbar').classList.toggle('visible', App.toolbarVisible);
  $('#reader-topbar').classList.toggle('visible', App.toolbarVisible);
}

function onSliderChange() {
  const page = parseInt($('#reader-slider').value);
  if (App.bmListMode) {
    showBmListPage(page);
    bmListPrefetch(page);
  } else {
    showPage(page);
    prefetch(page);
  }
}

function closeReader(fromPopState) {
  // Save progress immediately (only for normal books, not bmList)
  if (!App.bmListMode && App.currentBook && App.metadata.books[App.currentBook]) {
    App.metadata.books[App.currentBook].lastReadPage = App.currentPage;
    App.metadata.books[App.currentBook].lastReadTime = new Date().toISOString();
    saveMetadata();
  }

  closeBmPanel();

  // Reset bmList mode
  App.bmListMode = null;
  App.bmListItems = [];

  // Restore buttons that may have been hidden in bmList mode
  $('#reader-bookmark-btn').style.display = '';
  $('#reader-binding-btn').style.display = '';
  $('#reader-bm-list-btn').style.display = '';

  // Revoke page object URLs
  for (const url of Object.values(App.pageCache)) {
    URL.revokeObjectURL(url);
  }
  App.pageCache = {};
  App.currentBook = null;

  showScreen('shelf');
  if (!fromPopState) {
    history.pushState({ screen: 'shelf' }, '', window.location.pathname);
  }
  renderGrid(); // Update progress bars
}

function onPopState(e) {
  const state = e.state;
  if (!state || state.screen === 'shelf') {
    if (App.currentBook) closeReader(true);
    // Close any open modals
    hideModal('modal-new-list');
    hideModal('modal-folder');
    hideModal('modal-bm-browser');
  } else if (state.screen === 'reader' && state.bookId) {
    openReader(state.bookId);
  } else if (state.screen === 'reader' && state.bmList) {
    openBmListReader(state.bmList);
  }
}

// ============================================================
// KEYBOARD
// ============================================================
function onKeyDown(e) {
  if ($('#reader-screen').style.display !== 'flex') return;
  // Don't capture keys when editing bookmark note
  if (e.target.classList.contains('bm-note-input') || e.target.classList.contains('bmlist-new-input')) return;

  const binding = App.bmListMode ? 'ltr' : getBinding();
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    binding === 'rtl' ? goPrev() : goNext();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    binding === 'rtl' ? goNext() : goPrev();
  } else if ((e.key === 'b' || e.key === 'B') && !App.bmListMode) {
    e.preventDefault();
    toggleCurrentBookmark();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if ($('#bm-panel').classList.contains('visible')) closeBmPanel();
    else if (App.toolbarVisible) toggleToolbar();
    else closeReader();
  }
}

// ============================================================
// SWIPE
// ============================================================
function setupSwipe() {
  let startX = 0, startY = 0, startTime = 0;
  const canvas = $('#reader-canvas');

  canvas.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startTime;

    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx) || dt > 500) return;

    const binding = App.bmListMode ? 'ltr' : getBinding();
    if (dx > 0) {
      // Swipe right
      binding === 'rtl' ? goNext() : goPrev();
    } else {
      // Swipe left
      binding === 'rtl' ? goPrev() : goNext();
    }
  }, { passive: true });
}

// ============================================================
// SCROLL PAGE NAV
// ============================================================
function setupScroll() {
  let lastScroll = 0;
  $('#reader-screen').addEventListener('wheel', (e) => {
    if ($('#reader-screen').style.display !== 'flex') return;
    e.preventDefault();
    const now = Date.now();
    if (now - lastScroll < 250) return; // throttle
    lastScroll = now;
    if (e.deltaY > 0) goNext();
    else if (e.deltaY < 0) goPrev();
  }, { passive: false });
}

// ============================================================
// BOOKMARKS
// ============================================================
function getBookmarks(bookId) {
  if (!App.metadata.bookmarks) App.metadata.bookmarks = {};
  if (!App.metadata.bookmarks[bookId]) App.metadata.bookmarks[bookId] = [];
  return App.metadata.bookmarks[bookId];
}

function isPageBookmarked(bookId, page) {
  const bms = getBookmarks(bookId);
  return bms.some(b => b.page === page);
}

function toggleCurrentBookmark() {
  if (!App.currentBook) return;
  const bookId = App.currentBook;
  const page = App.currentPage;
  const bms = getBookmarks(bookId);
  const idx = bms.findIndex(b => b.page === page);

  if (idx >= 0) {
    bms.splice(idx, 1);
    toast(`ブックマーク削除: ${page + 1}ページ`);
  } else {
    bms.push({ page, note: '', created: new Date().toISOString() });
    bms.sort((a, b) => a.page - b.page);
    toast(`ブックマーク追加: ${page + 1}ページ`);
  }

  debouncedSave();
  updateBookmarkUI();
  if ($('#bm-panel').classList.contains('visible')) renderBmPanel();
}

function updateBookmarkUI() {
  if (!App.currentBook) return;
  const bookId = App.currentBook;
  const page = App.currentPage;
  const marked = isPageBookmarked(bookId, page);
  const bms = getBookmarks(bookId);

  // Bookmark button state
  const btn = $('#reader-bookmark-btn');
  btn.classList.toggle('active', marked);

  // Bookmark indicator on page
  $('#reader-bm-indicator').classList.toggle('active', marked);

  // Bookmark count
  const countEl = $('#bm-count');
  countEl.textContent = bms.length > 0 ? bms.length : '';

  // Bookmark dots on slider
  renderBmDots();
}

function renderBmDots() {
  const container = $('#reader-bm-dots');
  container.innerHTML = '';
  if (!App.currentBook || App.totalPages <= 1) return;

  const bms = getBookmarks(App.currentBook);
  if (bms.length === 0) return;

  const slider = $('#reader-slider');
  const binding = getBinding();

  for (const bm of bms) {
    const dot = document.createElement('div');
    dot.className = 'reader-bm-dot';
    const ratio = bm.page / (App.totalPages - 1);
    // RTL: slider direction is reversed, so invert position
    const pct = binding === 'rtl' ? (1 - ratio) * 100 : ratio * 100;
    dot.style.left = `calc(${pct}% - 2px)`;
    dot.title = `${bm.page + 1}ページ${bm.note ? ': ' + bm.note : ''}`;
    dot.onclick = (e) => {
      e.stopPropagation();
      showPage(bm.page);
      prefetch(bm.page);
    };
    container.appendChild(dot);
  }
}

function toggleBmPanel() {
  const panel = $('#bm-panel');
  if (panel.classList.contains('visible')) {
    closeBmPanel();
  } else {
    openBmPanel();
  }
}

function openBmPanel() {
  renderBmPanel();
  $('#bm-panel').classList.add('visible');
}

function closeBmPanel() {
  $('#bm-panel').classList.remove('visible');
}

function renderBmPanel() {
  const list = $('#bm-panel-list');
  if (!App.currentBook) { list.innerHTML = ''; return; }

  const bookId = App.currentBook;
  const bms = getBookmarks(bookId);

  if (bms.length === 0) {
    list.innerHTML = '<div class="bm-panel-empty">🔖 ブックマークはありません<br><span style="font-size:11px;color:#555;margin-top:4px;display:inline-block;">ツールバーの 🔖 ボタンで追加</span></div>';
    return;
  }

  list.innerHTML = '';
  for (const bm of bms) {
    const isCurrent = bm.page === App.currentPage;
    const entry = document.createElement('div');
    entry.className = 'bm-entry' + (isCurrent ? ' current' : '');

    // Thumbnail (use cache if available)
    let thumbHtml = '<div class="bm-entry-thumb"><span class="bm-entry-thumb-placeholder">p.' + (bm.page + 1) + '</span></div>';
    if (App.pageCache[bm.page]) {
      thumbHtml = `<div class="bm-entry-thumb"><img src="${App.pageCache[bm.page]}" alt=""></div>`;
    }

    const timeStr = bm.created ? new Date(bm.created).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

    entry.innerHTML = `
      ${thumbHtml}
      <div class="bm-entry-info">
        <div class="bm-entry-page">${bm.page + 1} / ${App.totalPages} ページ</div>
        ${bm.note ? `<div class="bm-entry-note">${bm.note}</div>` : '<div class="bm-entry-note" style="color:#555;font-style:italic;">メモなし</div>'}
        <div class="bm-entry-time">${timeStr}</div>
      </div>
      <div class="bm-entry-actions">
        <button class="bm-entry-btn addlist-btn" title="マイリストに追加">+📋</button>
        <button class="bm-entry-btn memo-btn" title="メモ編集">✏️</button>
        <button class="bm-entry-btn del" title="削除">✕</button>
      </div>
    `;

    // Jump to page on click
    entry.addEventListener('click', (e) => {
      if (e.target.closest('.bm-entry-btn') || e.target.closest('.bm-note-input')) return;
      showPage(bm.page);
      prefetch(bm.page);
      closeBmPanel();
    });

    // Add to bmList
    entry.querySelector('.addlist-btn').onclick = (e) => {
      e.stopPropagation();
      showAddToBmListDropdown(e.target, bookId, bm.page);
    };

    // Memo edit button
    entry.querySelector('.memo-btn').onclick = (e) => {
      e.stopPropagation();
      const infoDiv = entry.querySelector('.bm-entry-info');
      const existingInput = infoDiv.querySelector('.bm-note-input');
      if (existingInput) { existingInput.focus(); return; }

      const noteDiv = infoDiv.querySelector('.bm-entry-note');
      const input = document.createElement('input');
      input.className = 'bm-note-input';
      input.value = bm.note || '';
      input.placeholder = 'メモを入力...';
      input.maxLength = 100;
      noteDiv.replaceWith(input);
      input.focus();

      const save = () => {
        bm.note = input.value.trim();
        debouncedSave();
        renderBmPanel();
        updateBookmarkUI();
      };
      input.onblur = save;
      input.onkeydown = (ke) => {
        if (ke.key === 'Enter') { ke.preventDefault(); save(); }
        if (ke.key === 'Escape') { ke.preventDefault(); renderBmPanel(); }
        ke.stopPropagation();  // prevent reader keyboard nav
      };
    };

    // Delete button
    entry.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      const idx = bms.findIndex(b => b.page === bm.page);
      if (idx >= 0) {
        bms.splice(idx, 1);
        toast(`ブックマーク削除: ${bm.page + 1}ページ`);
        debouncedSave();
        updateBookmarkUI();
        renderBmPanel();
      }
    };

    list.appendChild(entry);

    // Async load thumbnail if not cached
    if (!App.pageCache[bm.page]) {
      loadBmThumb(bm.page, entry);
    }
  }
}

async function loadBmThumb(page, entry) {
  if (!App.currentBook || page < 0 || page >= App.totalPages) return;
  try {
    const pagePath = App.pagePaths[page];
    const buf = await App.storage.loadBinary(pagePath);
    const ext = pagePath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    const url = URL.createObjectURL(blob);
    App.pageCache[page] = url;
    const thumbDiv = entry.querySelector('.bm-entry-thumb');
    if (thumbDiv) thumbDiv.innerHTML = `<img src="${url}" alt="">`;
  } catch (e) { /* silent */ }
}

// BOOKMARK BROWSER (shelf-level modal)

function getAllBookmarksSorted() {
  const all = [];
  const bookmarks = App.metadata.bookmarks || {};
  for (const [bookId, bms] of Object.entries(bookmarks)) {
    for (const bm of bms) {
      all.push({ bookId, page: bm.page, note: bm.note, created: bm.created || '' });
    }
  }
  all.sort((a, b) => b.created.localeCompare(a.created)); // newest first
  return all;
}

function openBmBrowser() {
  App.bmBrowserDetail = null;
  renderBmBrowser();
  showModal('modal-bm-browser');
}

function renderBmBrowser() {
  const body = $('#bm-browser-body');
  if (App.bmBrowserTab === 'all') {
    renderBmBrowserAll(body);
  } else {
    if (App.bmBrowserDetail) {
      renderBmListDetail(body, App.bmBrowserDetail);
    } else {
      renderBmBrowserLists(body);

  }
}

function renderBmBrowserAll(body) {

    body.innerHTML = '<div class="bm-panel-empty">ブックマークはありません</div>';

  }

    const timeStr = item.created ? new Date(item.created).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

    const row = document.createElement('div');
    row.className = 'bm-all-entry';
    row.innerHTML = `
      <div class="bm-entry-thumb"><span class="bm-entry-thumb-placeholder">p.${item.page + 1}</span></div>
      <div class="bm-entry-info">
        <div class="bm-entry-page">${item.page + 1}ページ</div>
        <div class="bm-all-book">${title}</div>
        ${item.note ? `<div class="bmlist-item-note">${item.note}</div>` : ''}
        <div class="bm-entry-time">${timeStr}</div>
      </div>
      <div class="bm-all-actions">
        <button class="bm-all-btn accent" title="マイリストに追加">+リスト</button>
        <button class="bm-all-btn del" title="削除">✕</button>

    // Add to bmList
    row.querySelector('.accent').onclick = (e) => {
      e.stopPropagation();
      showAddToBmListDropdown(e.target, item.bookId, item.page);
    };

    // Delete
    row.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      const bms = getBookmarks(item.bookId);
      const idx = bms.findIndex(b => b.page === item.page);
      if (idx >= 0) {
        bms.splice(idx, 1);
        toast(`ブックマーク削除`);
        debouncedSave();
        renderBmBrowser();
      }
    };

    // Click to open book at page
    row.style.cursor = 'pointer';
    row.addEventListener('click', (e) => {
      if (e.target.closest('.bm-all-btn')) return;
      const bookEntry = App.bookFolders.find(f => f.id === item.bookId);
      if (bookEntry && bookEntry.metadataOnly) {
        toast('未ダウンロード');
        return;
      }
      hideModal('modal-bm-browser');

    });

    body.appendChild(row);
  }
}

async function loadBmBrowserThumb(bookId, page, thumbDiv) {
  // Try cover from store URL for DLsite/Fanza as a quick placeholder
  if (App.coverCache[bookId]) {
    thumbDiv.innerHTML = `<img src="${App.coverCache[bookId]}" alt="">`;
  }
}

function showAddToBmListDropdown(anchor, bookId, page) {
  // Remove any existing dropdown
  document.querySelectorAll('.bm-add-dropdown').forEach(d => d.remove());

  const lists = App.metadata.bmLists || {};
  const dropdown = document.createElement('div');
  dropdown.className = 'bm-add-dropdown';

  if (Object.keys(lists).length === 0) {
    dropdown.innerHTML = '<div class="bm-add-dropdown-item" style="color:#555;">マイリストがありません</div>';
  } else {
    for (const [name, list] of Object.entries(lists)) {
      const inList = list.items && list.items.some(i => i.bookId === bookId && i.page === page);
      const item = document.createElement('div');
      item.className = 'bm-add-dropdown-item' + (inList ? ' in-list' : '');
      item.textContent = (inList ? '✓ ' : '') + name;
      item.onclick = (e) => {
        e.stopPropagation();
        if (inList) {
          removeBmFromList(name, bookId, page);
        } else {
          addBmToList(name, bookId, page);
        }
        dropdown.remove();
        renderBmBrowser();
      };
      dropdown.appendChild(item);
    }
  }

  // Position near anchor
  const rect = anchor.getBoundingClientRect();
  dropdown.style.position = 'fixed';
  dropdown.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
  dropdown.style.top = (rect.bottom + 4) + 'px';
  document.body.appendChild(dropdown);

  // Auto close
  const close = (e) => {
    if (!dropdown.contains(e.target)) { dropdown.remove(); document.removeEventListener('click', close); }
  };
  setTimeout(() => document.addEventListener('click', close), 10);
}

function addBmToList(listName, bookId, page) {
  const list = App.metadata.bmLists[listName];
  if (!list) return;
  if (!list.items) list.items = [];
  if (list.items.some(i => i.bookId === bookId && i.page === page)) return;
  list.items.push({ bookId, page });
  toast(`「${listName}」に追加`);
  debouncedSave();
}

function removeBmFromList(listName, bookId, page) {
  const list = App.metadata.bmLists[listName];
  if (!list || !list.items) return;
  const idx = list.items.findIndex(i => i.bookId === bookId && i.page === page);
  if (idx >= 0) {
    list.items.splice(idx, 1);
    toast(`「${listName}」から削除`);
    debouncedSave();
  }
}

function setupBmListDrag(container, items, listName, bodyEl) {
  let dragIdx = null;

  container.querySelectorAll('.bmlist-item').forEach(row => {
    row.addEventListener('dragstart', (e) => {
      dragIdx = parseInt(row.dataset.idx);
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drag-over');
    });
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const dropIdx = parseInt(row.dataset.idx);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        const moved = items.splice(dragIdx, 1)[0];
        items.splice(dropIdx, 0, moved);
        debouncedSave();
        renderBmListDetail(bodyEl, listName);
      }
    });
  });

  // Touch drag support
  let touchRow = null, touchIdx = null, touchClone = null;

  container.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.bmlist-drag-handle');
    if (!handle) return;
    const row = handle.closest('.bmlist-item');
    if (!row) return;
    const idx = parseInt(row.dataset.idx);
    if (isNaN(idx)) return;

    e.preventDefault();
    touchRow = row;
    touchIdx = idx;
    row.classList.add('dragging');

    const rect = row.getBoundingClientRect();
    touchClone = row.cloneNode(true);
    touchClone.style.cssText = `position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:${rect.width}px;top:${rect.top}px;left:${rect.left}px;`;
    document.body.appendChild(touchClone);
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    if (!touchRow) return;
    e.preventDefault();
    const ty = e.touches[0].clientY;
    const tx = e.touches[0].clientX;
    if (touchClone) touchClone.style.top = (ty - 25) + 'px';
    container.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
    const el = document.elementFromPoint(tx, ty);
    const target = el && el.closest('.bmlist-item');
    if (target && target !== touchRow) target.classList.add('drag-over');
  }, { passive: false });

  container.addEventListener('touchend', (e) => {
    if (!touchRow) return;
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.bmlist-item');
    if (target && target !== touchRow) {
      const dropIdx = parseInt(target.dataset.idx);
      if (!isNaN(dropIdx) && touchIdx !== dropIdx) {
        const moved = items.splice(touchIdx, 1)[0];
        items.splice(dropIdx, 0, moved);
        debouncedSave();
        renderBmListDetail(bodyEl, listName);
      }
    }
    touchRow.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
    if (touchClone) { touchClone.remove(); touchClone = null; }
    touchRow = null;
    touchIdx = null;
  });
}

// ============================================================
// BM LIST READER (read a bmList as a virtual book)
// ============================================================
async function openBmListReader(listName) {
  const list = App.metadata.bmLists[listName];
  if (!list || !list.items || list.items.length === 0) {
    toast('空のマイリストです');
    return;
  }

  // Build virtual page list: resolve each item to its Dropbox path
  const resolvedItems = [];
  const pagePaths = [];

  // We need page paths for all items. Group by bookId to avoid redundant folder scans.
  const bookPageMap = {}; // bookId -> Set of page numbers needed
  for (const item of list.items) {
    if (!bookPageMap[item.bookId]) bookPageMap[item.bookId] = new Set();
    bookPageMap[item.bookId].add(item.page);
  }

  // Resolve paths per book
  const bookPathCache = {}; // bookId -> sorted image path array
  for (const bookId of Object.keys(bookPageMap)) {
    const meta = App.metadata.books[bookId] || {};
    try {
      const images = await listImagesRecursive('books/' + bookId, meta.hiddenPaths);
      bookPathCache[bookId] = images.map(e => e.path);
    } catch (e) {
      bookPathCache[bookId] = [];
    }
  }

  for (const item of list.items) {
    const paths = bookPathCache[item.bookId] || [];
    if (item.page < paths.length) {
      resolvedItems.push({ bookId: item.bookId, page: item.page, path: paths[item.page] });
      pagePaths.push(paths[item.page]);
    }
  }

  if (pagePaths.length === 0) {
    toast('読めるページがありません（未ダウンロード？）');
    return;
  }

  // Setup reader in bmList mode
  App.bmListMode = listName;
  App.bmListItems = resolvedItems;
  App.currentBook = '__bmlist__';
  App.pageCache = {};
  App.toolbarVisible = false;
  App.currentPage = 0;
  App.totalPages = pagePaths.length;
  App.pagePaths = pagePaths;

  $('#reader-toolbar').classList.remove('visible');
  $('#reader-topbar').classList.remove('visible');
  closeBmPanel();

  $('#reader-title').textContent = '📋 ' + listName;
  // Hide bookmark btn and binding btn in bmList mode
  $('#reader-bookmark-btn').style.display = 'none';
  $('#reader-binding-btn').style.display = 'none';
  $('#reader-bm-list-btn').style.display = 'none';

  showScreen('reader');
  history.pushState({ screen: 'reader', bmList: listName }, '', '#bmlist/' + encodeURIComponent(listName));
  $('#reader-loading').style.display = 'flex';
  $('#reader-img').src = '';

  // Setup slider
  const slider = $('#reader-slider');
  slider.min = 0;
  slider.max = Math.max(0, pagePaths.length - 1);
  slider.value = 0;
  slider.style.direction = 'ltr'; // bmList always LTR

  await showBmListPage(0);
  bmListPrefetch(0);
}

async function showBmListPage(pageNum) {
  if (pageNum < 0 || pageNum >= App.totalPages) return;
  App.currentPage = pageNum;

  const label = `${pageNum + 1} / ${App.totalPages}`;
  $('#reader-page-label').textContent = label;
  $('#reader-slider').value = pageNum;

  // Show source info in title
  if (App.bmListItems[pageNum]) {
    const item = App.bmListItems[pageNum];
    const meta = App.metadata.books[item.bookId] || {};
    const title = meta.title || item.bookId;
    $('#reader-title').textContent = `📋 ${App.bmListMode} — ${title} p.${item.page + 1}`;
  }

  // Hide bookmark indicator
  $('#reader-bm-indicator').classList.remove('active');
  // Clear bm dots
  $('#reader-bm-dots').innerHTML = '';

  if (App.pageCache[pageNum]) {
    $('#reader-img').src = App.pageCache[pageNum];
    $('#reader-loading').style.display = 'none';
    return;
  }

  $('#reader-loading').style.display = 'flex';
  try {
    const pagePath = App.pagePaths[pageNum];
    const buf = await App.storage.loadBinary(pagePath);
    const ext = pagePath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    const url = URL.createObjectURL(blob);
    App.pageCache[pageNum] = url;
    if (App.currentPage === pageNum) {
      $('#reader-img').src = url;
      $('#reader-loading').style.display = 'none';
    }
  } catch (e) {
    console.error('Failed to load bmList page:', e);
    $('#reader-loading').style.display = 'none';
  }
}

function bmListPrefetch(center) {
  for (let i = 1; i <= 2; i++) {
    bmListPrefetchOne(center + i);
    bmListPrefetchOne(center - i);
  }
}

async function bmListPrefetchOne(pageNum) {
  if (pageNum < 0 || pageNum >= App.totalPages) return;
  if (App.pageCache[pageNum]) return;
  try {
    const pagePath = App.pagePaths[pageNum];
    const buf = await App.storage.loadBinary(pagePath);
    const ext = pagePath.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const blob = new Blob([buf], { type: mime });
    App.pageCache[pageNum] = URL.createObjectURL(blob);
  } catch(e) { /* silent */ }
}

// Helper: open a specific book at a specific page
async function openReaderAtPage(bookId, page) {
  App.currentBook = bookId;
  App.pageCache = {};
  App.toolbarVisible = false;
  App.bmListMode = null;
  App.bmListItems = [];
  $('#reader-toolbar').classList.remove('visible');
  $('#reader-topbar').classList.remove('visible');
  closeBmPanel();

  // Restore buttons hidden in bmList mode
  $('#reader-bookmark-btn').style.display = '';
  $('#reader-binding-btn').style.display = '';
  $('#reader-bm-list-btn').style.display = '';

  const meta = App.metadata.books[bookId] || {};
  $('#reader-title').textContent = meta.title || bookId;
  updateBindingBtn();

  showScreen('reader');
  history.pushState({ screen: 'reader', bookId: bookId }, '', '#read/' + encodeURIComponent(bookId));
  $('#reader-loading').style.display = 'flex';
  $('#reader-img').src = '';

  try {
    const images = await listImagesRecursive('books/' + bookId, meta.hiddenPaths);
    App.totalPages = images.length;
    App.pagePaths = images.map(e => e.path);
    if (App.metadata.books[bookId]) App.metadata.books[bookId].totalPages = images.length;

    const startPage = Math.min(page, Math.max(0, images.length - 1));
    App.currentPage = startPage;

    const slider = $('#reader-slider');
    slider.min = 0;
    slider.max = Math.max(0, images.length - 1);
    slider.value = startPage;

    await showPage(startPage);
    prefetch(startPage);
    updateBookmarkUI();
  } catch (e) {
    console.error('Failed to open book:', e);
    toast('書籍を開けませんでした');
    closeReader();
  }
}

// ============================================================
// ZIP IMPORT
// ============================================================
async function onZipSelected(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;
  e.target.value = '';

  const bar = $('#import-bar');
  const fill = $('#import-bar-fill');
  const statusText = $('#import-status-text');

  bar.classList.add('active');
  statusText.classList.add('active');
  fill.style.width = '0%';

  toast(`${files.length}件のZIPをインポート中...`);

  // バックグラウンドで処理
  (async () => {
    let totalUploaded = 0;
    let totalImages = 0;

    // まず全ZIPの画像数を数える
    const zipData = [];
    for (const file of files) {
      try {
        const buf = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(buf);
        const entries = [];
        zip.forEach((path, entry) => { if (!entry.dir) entries.push({ path, entry }); });
        const imgs = entries.filter(e => IMG_RE.test(e.path));
        if (imgs.length > 0) {
          zipData.push({ name: file.name, folderName: file.name.replace(/\.zip$/i, ''), imgs, zip });
          totalImages += imgs.length;
        } else {
          toast(`${file.name}: 画像なし`);
        }
      } catch (err) {
        toast(`${file.name}: 読み込み失敗`);
      }
    }

    for (const { name, folderName, imgs } of zipData) {
      statusText.textContent = `${folderName}: 0/${imgs.length}枚`;
      const bookPath = 'books/' + folderName;

      try {
        for (let i = 0; i < imgs.length; i++) {
          const { path: entryPath, entry } = imgs[i];
          const data = await entry.async('arraybuffer');
          await App.storage.save(bookPath + '/' + entryPath, data);
          totalUploaded++;
          const pct = Math.round((totalUploaded / totalImages) * 100);
          fill.style.width = pct + '%';
          statusText.textContent = `${folderName}: ${i + 1}/${imgs.length}枚`;
        }

        if (!App.metadata.books[folderName]) {
          App.metadata.books[folderName] = {
            title: folderName, store: '', purchaseDate: '', tags: [],
            lists: [], coverImage: '', lastReadPage: 0,
            bindingDirection: 'rtl', totalPages: imgs.length, hiddenPaths: [],
          };
        } else {
          App.metadata.books[folderName].totalPages = imgs.length;
        }
      } catch (err) {
        console.error('ZIP import error:', err);
        toast(`${name}: 失敗`);
      }
    }

    await saveMetadata();
    bar.classList.remove('active');
    statusText.classList.remove('active');
    toast(`インポート完了: ${totalUploaded}ファイル`);
    await loadShelf();
  })();
}
